<title>SimpleBlueprints — Permit-Ready Deck Plans in Minutes</title>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;
// THREE loaded via CDN

// ============================================================
// LOAD-TIERED IRC SPAN TABLES (matches Python engine)
// ============================================================
const JOIST_SPANS = {
  50: { "2x6": { 12: 9.5, 16: 8.5, 24: 7 }, "2x8": { 12: 12.5, 16: 11.5, 24: 9.5 }, "2x10": { 12: 16, 16: 14.5, 24: 12 }, "2x12": { 12: 19.5, 16: 17.5, 24: 14.5 } },
  60: { "2x6": { 12: 8.5, 16: 7.5, 24: 6 }, "2x8": { 12: 11, 16: 10, 24: 8.5 }, "2x10": { 12: 14, 16: 12.5, 24: 10.5 }, "2x12": { 12: 17, 16: 15.5, 24: 12.5 } },
  75: { "2x6": { 12: 7.5, 16: 6.5, 24: 5.5 }, "2x8": { 12: 10, 16: 9, 24: 7.5 }, "2x10": { 12: 12.5, 16: 11, 24: 9.5 }, "2x12": { 12: 15, 16: 13.5, 24: 11 } },
  95: { "2x6": { 12: 6.5, 16: 5.5, 24: 4.5 }, "2x8": { 12: 8.5, 16: 7.5, 24: 6.5 }, "2x10": { 12: 11, 16: 9.5, 24: 8 }, "2x12": { 12: 13, 16: 11.5, 24: 9.5 } },
};

const FROST = { warm: 12, moderate: 24, cold: 36, severe: 48 };
const SNOW = { none: 0, light: 20, moderate: 40, heavy: 60 };

function getSpanTable(TL) {
  for (const tier of [50, 60, 75, 95]) { if (TL <= tier) return JOIST_SPANS[tier]; }
  return JOIST_SPANS[95];
}

function calcStructure(p) {
  const { width: W, depth: D, height: H, joistSpacing: sp, attachment, snowLoad, frostZone, deckingType } = p;
  const area = W * D;
  const LL = 40 + (SNOW[snowLoad] || 0);
  const DL = deckingType === "composite" ? 15 : 12;
  const TL = LL + DL;
  const jSpan = attachment === "ledger" ? D - 1.5 : D / 2 - 0.75;
  const table = getSpanTable(TL);

  // === JOISTS (overridable) ===
  let joistSize = "2x12";
  let joistAuto = true;
  for (const [sz, spans] of Object.entries(table)) { if ((spans[sp] || 0) >= jSpan) { joistSize = sz; break; } }
  const autoJoist = joistSize;
  if (p.overJoist) { joistSize = p.overJoist; joistAuto = false; }

  // === POSTS (overridable count) ===
  let nP = W <= 10 ? 2 : W <= 16 ? 3 : W <= 24 ? 3 : W <= 32 ? 4 : Math.max(4, Math.ceil(W / 10) + 1);
  const autoNP = nP;
  if (p.overPostCount) { nP = p.overPostCount; }
  const bSpan = W / (nP - 1);

  // === BEAM (overridable) ===
  let beamSize = "2-ply 2x10";
  if (bSpan > 8 || D > 10) beamSize = "3-ply 2x10";
  if (bSpan > 10 || D > 12) beamSize = "3-ply 2x12";
  if (bSpan > 12) beamSize = "3-ply LVL 1.75x12";
  const autoBeam = beamSize;
  if (p.overBeam) { beamSize = p.overBeam; }

  // === POST SIZE (overridable) ===
  let postSize = H > 8 ? "6x6" : (TL > 60 && H > 5 ? "6x6" : "4x4");
  const autoPostSize = postSize;
  if (p.overPostSize) { postSize = p.overPostSize; }

  const pp = []; for (let i = 0; i < nP; i++) pp.push(+(2 + i * (W - 4) / (nP - 1)).toFixed(2));
  const trib = (W / Math.max(nP - 1, 1)) * D;
  const reqD = Math.sqrt(trib * TL / 1500 / Math.PI) * 2 * 12;

  // === FOOTINGS (overridable) ===
  let fDiam = [12, 16, 18, 21, 24, 30].find(s => s >= reqD) || 30;
  const autoFDiam = fDiam;
  if (p.overFooting) { fDiam = p.overFooting; }
  const fDepth = FROST[frostZone] || 30;
  const nJ = Math.ceil(W / (sp / 12)) + 1;
  let railLen = W + D * 2; if (attachment === "freestanding") railLen += W;
  if (p.hasStairs) railLen -= 3;
  const totalPosts = attachment === "ledger" ? nP : nP * 2;
  let stairs = null;
  if (p.hasStairs && H > 0.5) {
    const stairW = p.stairWidth || 4;
    const nStringers = p.numStringers || 3;
    const nR = Math.ceil(H * 12 / 7.5); const aR = H * 12 / nR;
    const tR = (nR - 1) * 10.5;
    const stairGeom = computeStairGeometry({ template: p.stairTemplate || "straight", height: H, stairWidth: stairW, numStringers: nStringers, runSplit: p.stairRunSplit ? p.stairRunSplit/100 : null, landingDepth: p.stairLandingDepth || null, stairGap: p.stairGap != null ? p.stairGap : 0.5 });
    stairs = {
      nRisers: nR, nTreads: nR - 1, rise: +aR.toFixed(2), tread: 10.5,
      runFt: +(tR / 12).toFixed(1),
      stringerFt: +(Math.sqrt((H * 12) ** 2 + tR ** 2) / 12 + 1).toFixed(1),
      width: stairW, nStringers,
      hasLanding: stairGeom ? stairGeom.landings.length > 0 : !!p.hasLanding,
      location: p.stairLocation || "front",
      template: p.stairTemplate || "straight",
      stairGeom: stairGeom,
      totalLandingPosts: stairGeom ? stairGeom.totalLandingPosts : 0,
      totalStringers: stairGeom ? stairGeom.totalStringers : nStringers,
      numRuns: stairGeom ? stairGeom.runs.length : 1,
      numLandings: stairGeom ? stairGeom.landings.length : 0,
    };
  }
  const warnings = [];
  const maxSpan = (table["2x12"] || {})[sp] || 0;
  if (jSpan > maxSpan) warnings.push(`Joist span (${jSpan.toFixed(1)}') exceeds IRC at ${TL} PSF. Engineering required.`);
  if (H > 10) warnings.push("Height >10'. Lateral bracing by engineer recommended.");
  if (area > 500) warnings.push("Area >500 SF. Check local permit requirements.");

  // Override warnings — warn if user picked something smaller than auto
  const joistRank = { "2x6": 0, "2x8": 1, "2x10": 2, "2x12": 3 };
  if (p.overJoist && (joistRank[p.overJoist] || 0) < (joistRank[autoJoist] || 0)) {
    warnings.push(`⬇ Joist override (${p.overJoist}) is smaller than recommended (${autoJoist}). May not meet code.`);
  }
  const beamRank = { "2-ply 2x8": 0, "2-ply 2x10": 1, "2-ply 2x12": 2, "3-ply 2x10": 3, "3-ply 2x12": 4, "3-ply LVL 1.75x12": 5 };
  if (p.overBeam && (beamRank[p.overBeam] || 0) < (beamRank[autoBeam] || 0)) {
    warnings.push(`⬇ Beam override (${p.overBeam}) is smaller than recommended (${autoBeam}). May not meet code.`);
  }
  if (p.overPostSize === "4x4" && autoPostSize === "6x6") {
    warnings.push(`⬇ Post override (4x4) is smaller than recommended (6x6). May not meet code.`);
  }
  if (p.overFooting && p.overFooting < autoFDiam) {
    warnings.push(`⬇ Footing override (${p.overFooting}") is smaller than recommended (${autoFDiam}"). May not meet code.`);
  }
  if (p.overPostCount && p.overPostCount < autoNP) {
    warnings.push(`⬇ Fewer posts (${p.overPostCount}) than recommended (${autoNP}). May not meet code.`);
  }

  return { W, D, H, area, LL, DL, TL, joistSize, sp, jSpan: +jSpan.toFixed(1), nJ, beamSize, bSpan: +bSpan.toFixed(1), postSize, nP, totalPosts, pp, fDiam, fDepth, nF: totalPosts, ledgerSize: joistSize, railLen: +railLen.toFixed(1), stairs, warnings, attachment,
    auto: { joist: autoJoist, beam: autoBeam, postSize: autoPostSize, postCount: autoNP, footing: autoFDiam }
  };
}


// ============================================================
// STAIR GEOMETRY ENGINE — Multi-segment stair templates
// All coords in feet. Origin (0,0) = stair exit on deck edge.
// +Y = away from house, +X = right (facing away from house)
// ============================================================
// STEP-A-PARAMETRIC-PATCHED
function computeStairGeometry(params) {
  var p;
  if (typeof params === "object" && params !== null && !Array.isArray(params)) {
    p = params;
  } else {
    p = { template: arguments[0], height: arguments[1], stairWidth: arguments[2], numStringers: arguments[3] };
  }
  var template = p.template || "straight";
  var height = p.height;
  var stairWidth = p.stairWidth;
  var numStringers = p.numStringers;
  var runSplit = (p.runSplit != null) ? p.runSplit : null;
  var landingDepthOvr = (p.landingDepth != null) ? p.landingDepth : null;
  var stairGap = (p.stairGap != null) ? p.stairGap : 0.5;
  if (height <= 0.5) return null;
  const sw = stairWidth || 4;
  const ns = numStringers || 3;
  const totalRiseIn = height * 12;
  const totalRisers = Math.ceil(totalRiseIn / 7.5);
  const riseIn = totalRiseIn / totalRisers;
  const treadIn = 10.5;
  const gap = stairGap;
  function splitRisers(nRuns) {
    if (nRuns === 1) return [totalRisers];
    if (nRuns === 2) {
      const ratio = (runSplit != null && !Array.isArray(runSplit)) ? runSplit : 0.55;
      const r1 = Math.ceil(totalRisers * ratio);
      return [r1, totalRisers - r1];
    }
    if (nRuns === 3) {
      const ratios = Array.isArray(runSplit) ? runSplit : [0.4, 0.3];
      const r1 = Math.ceil(totalRisers * ratios[0]);
      const r2 = Math.ceil(totalRisers * ratios[1]);
      return [r1, r2, totalRisers - r1 - r2];
    }
    return [totalRisers];
  }
  function getLandingDepth() {
    return landingDepthOvr != null ? landingDepthOvr : Math.max(sw, 4);
  }
  function makeRun(risers) {
    const treads = Math.max(risers - 1, 1);
    const runFt = +(treads * treadIn / 12).toFixed(1);
    return { risers, treads, runFt, nStringers: ns };
  }
  let runs = [], landings = [];
  if (template === "straight") {
    const run = makeRun(totalRisers);
    runs.push({ ...run, rect: { x: -sw/2, y: 0, w: sw, h: run.runFt }, treadAxis: "h", downDir: "+y" });
  }
  else if (template === "wideLanding") {
    const [r1n, r2n] = splitRisers(2);
    const run1 = makeRun(r1n), run2 = makeRun(r2n);
    const platW = sw + 2, platD = getLandingDepth();
    runs.push({ ...run1, rect: { x: -sw/2, y: 0, w: sw, h: run1.runFt }, treadAxis: "h", downDir: "+y" });
    const ly = run1.runFt;
    landings.push({ rect: { x: -platW/2, y: ly, w: platW, h: platD }, posts: [[-platW/2, ly], [platW/2, ly], [-platW/2, ly+platD], [platW/2, ly+platD]] });
    runs.push({ ...run2, rect: { x: -sw/2, y: ly+platD, w: sw, h: run2.runFt }, treadAxis: "h", downDir: "+y" });
  }
  else if (template === "lLeft") {
    const [r1n, r2n] = splitRisers(2);
    const run1 = makeRun(r1n), run2 = makeRun(r2n), lD = getLandingDepth();
    runs.push({ ...run1, rect: { x: -sw/2, y: 0, w: sw, h: run1.runFt }, treadAxis: "h", downDir: "+y" });
    const ly = run1.runFt, landW = sw + run2.runFt, lx = -sw/2 - run2.runFt;
    landings.push({ rect: { x: lx, y: ly, w: landW, h: lD }, posts: [[lx, ly], [lx+landW, ly], [lx, ly+lD], [lx+landW, ly+lD]] });
    runs.push({ ...run2, rect: { x: lx, y: ly + (lD-sw)/2, w: run2.runFt, h: sw }, treadAxis: "w", downDir: "-x" });
  }
  else if (template === "lRight") {
    const [r1n, r2n] = splitRisers(2);
    const run1 = makeRun(r1n), run2 = makeRun(r2n), lD = getLandingDepth();
    runs.push({ ...run1, rect: { x: -sw/2, y: 0, w: sw, h: run1.runFt }, treadAxis: "h", downDir: "+y" });
    const ly = run1.runFt, lx = -sw/2, landW = sw + run2.runFt;
    landings.push({ rect: { x: lx, y: ly, w: landW, h: lD }, posts: [[lx, ly], [lx+landW, ly], [lx, ly+lD], [lx+landW, ly+lD]] });
    runs.push({ ...run2, rect: { x: sw/2, y: ly + (lD-sw)/2, w: run2.runFt, h: sw }, treadAxis: "w", downDir: "+x" });
  }
  else if (template === "switchback") {
    const [r1n, r2n] = splitRisers(2);
    const run1 = makeRun(r1n), run2 = makeRun(r2n);
    const maxRun = Math.max(run1.runFt, run2.runFt), lD = getLandingDepth(), totalW = sw * 2 + gap;
    runs.push({ ...run1, rect: { x: gap/2, y: 0, w: sw, h: run1.runFt }, treadAxis: "h", downDir: "+y" });
    const ly = maxRun;
    landings.push({ rect: { x: -sw - gap/2, y: ly, w: totalW, h: lD }, posts: [[-sw-gap/2, ly], [sw+gap/2, ly], [-sw-gap/2, ly+lD], [sw+gap/2, ly+lD]] });
    runs.push({ ...run2, rect: { x: -sw - gap/2, y: ly + lD - run2.runFt, w: sw, h: run2.runFt }, treadAxis: "h", downDir: "-y" });
  }
  else if (template === "wrapAround") {
    const [r1n, r2n, r3n] = splitRisers(3);
    const run1 = makeRun(r1n), run2 = makeRun(r2n), run3 = makeRun(r3n);
    const lD = getLandingDepth(), totalW = sw * 2 + gap;
    runs.push({ ...run1, rect: { x: gap/2, y: 0, w: sw, h: run1.runFt }, treadAxis: "h", downDir: "+y" });
    const l1y = run1.runFt;
    landings.push({ rect: { x: -sw-gap/2, y: l1y, w: totalW, h: lD }, posts: [[-sw-gap/2, l1y], [sw+gap/2, l1y], [-sw-gap/2, l1y+lD], [sw+gap/2, l1y+lD]] });
    runs.push({ ...run2, rect: { x: -sw-gap/2, y: l1y + lD - run2.runFt, w: sw, h: run2.runFt }, treadAxis: "h", downDir: "-y" });
    const l2y = l1y + lD - run2.runFt - lD, l2x = -sw - gap/2 - run3.runFt;
    landings.push({ rect: { x: l2x, y: l2y, w: sw + run3.runFt + gap/2, h: lD }, posts: [[l2x, l2y], [-gap/2, l2y], [l2x, l2y+lD], [-gap/2, l2y+lD]] });
    runs.push({ ...run3, rect: { x: l2x, y: l2y + (lD-sw)/2, w: run3.runFt, h: sw }, treadAxis: "w", downDir: "-x" });
  }
  let minX=Infinity, minY=Infinity, maxX=-Infinity, maxY=-Infinity;
  [...runs, ...landings].forEach(item => { const r = item.rect; minX = Math.min(minX, r.x); minY = Math.min(minY, r.y); maxX = Math.max(maxX, r.x + r.w); maxY = Math.max(maxY, r.y + r.h); });
  return { template, runs, landings, totalRisers, riseIn, stairWidth: sw,
    bbox: { minX, minY, maxX, maxY, w: maxX-minX, h: maxY-minY },
    totalStringers: runs.reduce((s,r) => s + r.nStringers, 0),
    totalLandingPosts: landings.reduce((s,l) => s + l.posts.length, 0),
    params: p };
}

function estMaterials(p, c) {
  const items = [];
  const bags = Math.ceil((Math.PI * (c.fDiam / 24) ** 2 * (c.fDepth / 12)) / 0.6) * c.nF;
  items.push({ cat: "Foundation", item: "Concrete 80lb bags", qty: bags, cost: 6.5 });
  items.push({ cat: "Foundation", item: `Sonotube ${c.fDiam}"`, qty: c.nF, cost: c.fDiam > 18 ? 28 : 18 });
  items.push({ cat: "Foundation", item: "Post Base Hardware", qty: c.nF, cost: c.postSize === "6x6" ? 42 : 28 });
  items.push({ cat: "Posts", item: `${c.postSize} PT Posts`, qty: c.totalPosts, cost: c.postSize === "6x6" ? 48 : 24 });
  items.push({ cat: "Posts", item: "Post Cap Hardware", qty: c.totalPosts, cost: c.postSize === "6x6" ? 38 : 22 });
  const plies = parseInt(c.beamSize[0]); const isLVL = c.beamSize.includes("LVL");
  items.push({ cat: "Beam", item: isLVL ? "LVL 20'" : "PT Beam 20'", qty: Math.ceil(c.W / 20) * plies, cost: isLVL ? 95 : 55 });
  if (c.attachment === "ledger") {
    items.push({ cat: "Ledger", item: `${c.ledgerSize} PT Ledger`, qty: Math.ceil(c.W / 12), cost: 32 });
    items.push({ cat: "Ledger", item: "LedgerLok Screws (box)", qty: Math.ceil(c.W / (16 / 12) * 2 / 50), cost: 85 });
    items.push({ cat: "Ledger", item: "Flashing", qty: 1, cost: 55 });
  }
  const jL = Math.ceil(c.D);
  items.push({ cat: "Framing", item: `${c.joistSize} Joists ${jL}'`, qty: c.nJ + 4, cost: jL <= 10 ? 22 : jL <= 12 ? 32 : 42 });
  items.push({ cat: "Framing", item: "Rim Joists", qty: Math.ceil(c.W / 12) + 2, cost: 32 });
  items.push({ cat: "Hardware", item: "Joist Hangers", qty: c.nJ * 2, cost: 6 });
  items.push({ cat: "Hardware", item: "Hurricane Ties + Nails", qty: 1, cost: c.nJ * 2.75 + 50 });
  const bds = Math.ceil(c.W / (5.5 / 12)) * 1.1;
  if (p.deckingType === "composite") {
    items.push({ cat: "Decking", item: `Composite ${Math.ceil(c.D + 2)}'`, qty: Math.ceil(bds), cost: c.D <= 10 ? 28 : 38 });
    items.push({ cat: "Decking", item: "Hidden Fasteners", qty: 1, cost: 175 });
  } else {
    items.push({ cat: "Decking", item: `5/4x6 PT ${Math.ceil(c.D + 2)}'`, qty: Math.ceil(bds), cost: c.D <= 10 ? 12 : 18 });
    items.push({ cat: "Decking", item: "Deck Screws 5lb", qty: Math.ceil(c.W * c.D / 50), cost: 32 });
  }
  const rP = Math.ceil(c.railLen / 6) + 1;
  if (p.railType === "fortress") {
    items.push({ cat: "Railing", item: "Fortress Panels", qty: Math.ceil(c.railLen / 7), cost: 80 });
    items.push({ cat: "Railing", item: "Fortress Posts", qty: rP, cost: 45 });
    items.push({ cat: "Railing", item: "Top Rail + Brackets", qty: Math.ceil(c.railLen / 7), cost: 52 });
  } else {
    items.push({ cat: "Railing", item: "Wood Rail Kit (8')", qty: Math.ceil(c.railLen / 8), cost: 85 });
  }
  // Stair materials
  if (c.stairs) {
    const st = c.stairs;
    // Stringers for all runs
    items.push({ cat: "Stairs", item: "2x12 Stair Stringers " + st.stringerFt + "'", qty: st.totalStringers, cost: st.stringerFt <= 8 ? 22 : st.stringerFt <= 12 ? 35 : 48 });
    // Treads
    items.push({ cat: "Stairs", item: "5/4x12 PT Treads", qty: st.nTreads * Math.ceil(st.width / 1), cost: 18 });
    // Stringer hardware
    items.push({ cat: "Stairs", item: "Stair Stringer Brackets", qty: st.totalStringers, cost: 8 });
    // Landing materials (if multi-segment)
    if (st.numLandings > 0) {
      items.push({ cat: "Stairs", item: "Landing Posts " + c.postSize, qty: st.totalLandingPosts, cost: c.postSize === "6x6" ? 48 : 24 });
      items.push({ cat: "Stairs", item: "Landing Post Bases", qty: st.totalLandingPosts, cost: c.postSize === "6x6" ? 42 : 28 });
      items.push({ cat: "Stairs", item: "Landing Footings " + c.fDiam + '"', qty: st.totalLandingPosts, cost: c.fDiam > 18 ? 28 : 18 });
      items.push({ cat: "Stairs", item: "Landing Framing Lumber", qty: st.numLandings * 4, cost: 22 });
      items.push({ cat: "Stairs", item: "Landing Decking", qty: st.numLandings * Math.ceil(st.width + 2), cost: p.deckingType === "composite" ? 28 : 12 });
    }
  }
  items.push({ cat: "Misc", item: "Joist Tape + Misc", qty: 1, cost: 120 });
  if (p.beamType === 'flush') {
    const joistCount = Math.ceil((p.width * 12) / 16) + 1;
    items.push({ cat: "Hardware", item: "Beam Joist Hangers (LUS)", qty: joistCount, cost: 4 });
  }
  const sub = items.reduce((s, i) => s + i.qty * i.cost, 0);
  return { items, sub, tax: sub * 0.08, cont: sub * 0.05, total: sub * 1.13 };
}

// ============================================================
// STAIR PLACEMENT — parametric anchor + angle
// ============================================================
function getStairPlacement(p, c) {
  // If new parametric coords are set, use them directly
  if (p.stairAnchorX != null && p.stairAnchorY != null && p.stairAngle != null) {
    return { anchorX: p.stairAnchorX, anchorY: p.stairAnchorY, angle: p.stairAngle };
  }
  // Otherwise derive from legacy stairLocation + stairOffset
  const W = c.W, D = c.D;
  const off = p.stairOffset || 0;
  const loc = p.stairLocation || "front";
  if (loc === "front") return { anchorX: W / 2 + off, anchorY: D, angle: 0 };
  if (loc === "right") return { anchorX: W, anchorY: D / 2 + off, angle: 90 };
  if (loc === "left")  return { anchorX: 0, anchorY: D / 2 + off, angle: 270 };
  return { anchorX: W / 2, anchorY: D, angle: 0 };
}

// Snap anchor to nearest deck edge if within threshold (returns {anchorX, anchorY, angle, snapped})
function snapStairToEdge(ax, ay, W, D, threshold) {
  const th = threshold || 1.0;
  const edges = [
    { dist: Math.abs(ay - D), anchorX: ax, anchorY: D, angle: 0, edge: "front" },
    { dist: Math.abs(ax - W), anchorX: W, anchorY: ay, angle: 90, edge: "right" },
    { dist: Math.abs(ay),     anchorX: ax, anchorY: 0, angle: 180, edge: "back" },
    { dist: Math.abs(ax),     anchorX: 0, anchorY: ay, angle: 270, edge: "left" },
  ];
  edges.sort((a, b) => a.dist - b.dist);
  const nearest = edges[0];
  if (nearest.dist <= th) {
    return { anchorX: nearest.anchorX, anchorY: nearest.anchorY, angle: nearest.angle, snapped: true, edge: nearest.edge };
  }
  // Free placement — keep current angle or default to 0
  return { anchorX: ax, anchorY: ay, angle: null, snapped: false, edge: null };
}

// ============================================================
// PLAN VIEW SVG
// ============================================================
function PlanView({ p, c, mode, u }) {
  const pad = 45; const sc = Math.min(420 / Math.max(c.W, 16), 18);

  const houseCx = svgW / 2;

  // Deck position: centered on house by default, offset shifts it
  const deckOff = (p.deckOffset || 0) * sc;
  const dx = houseCx - sw / 2 + deckOff;
  const jLines = []; if (mode === "framing") { const s = c.sp / 12 * sc; for (let x = s; x < sw - 1; x += s) jLines.push(x); }

  // Drag state
  const dragRef = useRef(null);
  const svgRef = useRef(null);
  const [stairSelected, setStairSelected] = useState(false);
  const [rotPreview, setRotPreview] = useState(null); // degrees during drag, null when idle

      startVal: type === "deck" ? (p.deckOffset || 0) : (p.stairOffset || 0) };

    const onMove = (ev) => {
      if (!dragRef.current) return;

        const newVal = Math.round(Math.max(-maxOff, Math.min(maxOff, dragRef.current.startVal + deltaFt)));
        u("deckOffset", newVal);
      } else {
        const maxStairOff = loc === "front" ? (c.W - (p.stairWidth || 4)) / 2 :
                            (c.D - (p.stairWidth || 4)) / 2;
        const newVal = Math.round(Math.max(-maxStairOff, Math.min(maxStairOff, dragRef.current.startVal + deltaFt)));
        u("stairOffset", newVal);
      }
    };
    const onUp = () => { dragRef.current = null; window.removeEventListener("pointermove", onMove); window.removeEventListener("pointerup", onUp); };
    window.addEventListener("pointermove", onMove);
    window.addEventListener("pointerup", onUp);

  // Stair anchor drag (2D free placement with edge snap)
  const onStairDragStart = (e) => {
    e.preventDefault(); e.stopPropagation();
    const svg = svgRef.current; if (!svg) return;
    const rect = svg.getBoundingClientRect();
    const svgScale = svgW / rect.width;
    const pl = getStairPlacement(p, c);
    dragRef.current = { type: "stairAnchor", startX: e.clientX, startY: e.clientY, svgScale,
      startAnchorX: pl.anchorX, startAnchorY: pl.anchorY, startAngle: pl.angle };

    const onMove = (ev) => {
      if (!dragRef.current || dragRef.current.type !== "stairAnchor") return;
      const deltaXpx = (ev.clientX - dragRef.current.startX) * dragRef.current.svgScale;
      const deltaYpx = (ev.clientY - dragRef.current.startY) * dragRef.current.svgScale;
      const deltaXft = deltaXpx / sc;
      const deltaYft = deltaYpx / sc;
      let newAX = dragRef.current.startAnchorX + deltaXft;
      let newAY = dragRef.current.startAnchorY + deltaYft;

      <line x1={pad + sw + 20} y1={pad} x2={pad + sw + 20} y2={pad + sd} stroke="#1565c0" strokeWidth="0.6" />
      <line x1={pad + sw + 17} y1={pad} x2={pad + sw + 23} y2={pad} stroke="#1565c0" strokeWidth="0.6" />
      <line x1={pad + sw + 17} y1={pad + sd} x2={pad + sw + 23} y2={pad + sd} stroke="#1565c0" strokeWidth="0.6" />
      <text x={pad + sw + 32} y={pad + sd / 2 + 3} textAnchor="middle" style={{ fontSize: 9, fill: "#1565c0", fontWeight: 800, fontFamily: "'DM Mono', monospace" }} transform={`rotate(90, ${pad + sw + 32}, ${pad + sd / 2})`}>{c.D}'-0"</text>
      <g transform={`translate(${svgW - 28}, 25)`}><line x1="0" y1="14" x2="0" y2="0" stroke="#444" strokeWidth="1.5" /><polygon points="-3.5,4 0,0 3.5,4" fill="#444" /><text x="0" y="-4" textAnchor="middle" style={{ fontSize: 7, fontWeight: 800, fill: "#444" }}>N</text></g>
    </svg>
  );
}

// ============================================================
// ELEVATION SVG
// ============================================================
function ElevationView({ c, p }) {
  const { W, D, H, beamSize, postSize, nP, pp, fDiam, fDepth } = c;
  const pad = 40; const sY = Math.min(16, 250 / Math.max(H + 6, 10)); const sX = Math.min(14, 440 / Math.max(W + 10, 20));
  const gnd = pad + (H + 4) * sY; const dY = gnd - H * sY; const rTop = dY - 3 * sY;
  const dX = pad; const dSW = W * sX;
  const hW = p.houseWidth * sX; const hX = dX + (dSW - hW) / 2 - (p.deckOffset || 0) * sX;
  const fndH = (H + 1) * sY; const f1H = 0.5 * sY; const f2H = 6.7 * sY;
  const wallH = fndH + f1H + f2H; const roofPk = 5 * sY; const hTop = gnd - wallH;
  const bH = 1 * sY;

  // Stair geometry
  const hasSt = p.hasStairs && c.stairs;
  const st = hasSt ? c.stairs : null;
  const geom = st ? st.stairGeom : null;
  const lshapeTemplates = ["lLeft","lRight"];
  const forceSide = hasSt && lshapeTemplates.includes(p.stairTemplate);
  const isFront = !forceSide && p.stairLocation === "front";
  const isSide = forceSide || p.stairLocation === "left" || p.stairLocation === "right";
  const effectiveSideDir = forceSide ? "right" : p.stairLocation;
  const risePerRiser = st ? (gnd - dY) / st.nRisers : 0;
  const treadPx = st ? (st.tread / 12) * sX : 0;
  const stairRunPx = st ? st.nTreads * treadPx : 0;
  const leftOverhang = (hasSt && p.stairLocation === "left") ? stairRunPx + pad + 15 : 0;
  const stairFootprintH = hasSt && isFront ? st.nTreads * treadPx + 20 : 0;
  const svgW = dSW + pad * 2 + 70 + leftOverhang;
  const svgH = wallH + roofPk + pad + 30 + stairFootprintH;

  // Helper: draw one run as stepped profile (front view = steps going downward in Y, spreading in X from center)
  function singleRunFrontProfile(cx, stW, topY, botY, nRisers, nTreads, rpp, tpx, keyPfx) {
    const els = [];
    // Left stringer outline
    els.push(<line key={keyPfx+"sl"} x1={cx-stW/2} y1={topY} x2={cx-stW/2} y2={botY} stroke="#444" strokeWidth="0.8" />);
    // Right stringer outline  
    els.push(<line key={keyPfx+"sr"} x1={cx+stW/2} y1={topY} x2={cx+stW/2} y2={botY} stroke="#444" strokeWidth="0.8" />);
    // Top connection
    els.push(<line key={keyPfx+"st"} x1={cx-stW/2} y1={topY} x2={cx+stW/2} y2={topY} stroke="#444" strokeWidth="0.8" />);
    // Bottom connection
    els.push(<line key={keyPfx+"sb"} x1={cx-stW/2} y1={botY} x2={cx+stW/2} y2={botY} stroke="#444" strokeWidth="0.8" />);
    // Tread lines (horizontal)
    for (var i=1; i<=nTreads; i++) {
      var ty = topY + i * rpp;
      els.push(<line key={keyPfx+"t"+i} x1={cx-stW/2+1} y1={ty} x2={cx+stW/2-1} y2={ty} stroke="#888" strokeWidth="0.5" />);
    }
    return els;
  }

  const stairEls = [];
  if (hasSt) {
    const stW = st.width * sX;
    const cx = dX + dSW / 2 + (p.stairOffset || 0) * sX;

    if (isFront) {
      // FRONT ELEVATION: Draw stair as stepped side-profile silhouette centered on deck
      // The stair descends from dY down to gnd, and treads extend forward (downward in SVG = outward from house)
      // We draw the RIGHT side stringer profile as a stepped silhouette
      const stairLeft = cx - stW / 2;
      const stairRight = cx + stW / 2;

      if (!geom || geom.runs.length <= 1) {
        // Single run - stepped profile on both sides
        // Left profile
        var lPts = [];
        var ly = dY; var lx = stairLeft;
        lPts.push([lx, ly]);
        for (var i = 0; i < st.nRisers; i++) {
          lPts.push([lx, ly + risePerRiser]);           // riser down
          if (i < st.nTreads) lPts.push([lx + treadPx, ly + risePerRiser]); // tread out... wait
          ly += risePerRiser;
          // actually treads go forward (increase SVG Y for front view since forward = away from house)
        }
        // For FRONT elevation: riser = vertical line, tread = we see the tread face-on (horizontal line)
        // So we just show stringer boxes + horizontal tread lines
        stairEls.push(...singleRunFrontProfile(cx, stW, dY, gnd, st.nRisers, st.nTreads, risePerRiser, treadPx, "sr"));

        // Stringer diagonal lines (shows the rake angle)
        stairEls.push(<line key="strL" x1={stairLeft+1} y1={dY} x2={stairLeft+1} y2={gnd} stroke="#555" strokeWidth="1.2" />);
        stairEls.push(<line key="strR" x1={stairRight-1} y1={dY} x2={stairRight-1} y2={gnd} stroke="#555" strokeWidth="1.2" />);

        // Handrail lines
        stairEls.push(<line key="hrL" x1={stairLeft-2} y1={dY-8} x2={stairLeft-2} y2={gnd-8} stroke="#666" strokeWidth="0.6" strokeDasharray="2,1" />);
        stairEls.push(<line key="hrR" x1={stairRight+2} y1={dY-8} x2={stairRight+2} y2={gnd-8} stroke="#666" strokeWidth="0.6" strokeDasharray="2,1" />);

        // Rise/run callout
        stairEls.push(<text key="rrcall" x={cx+stW/2+6} y={dY + (gnd-dY)/2} style={{ fontSize: 4.5, fill: "#333", fontFamily: "monospace" }}>RISE: {Math.round(H/st.nRisers*12*10)/10}"</text>);
        stairEls.push(<text key="rrcall2" x={cx+stW/2+6} y={dY + (gnd-dY)/2 + 7} style={{ fontSize: 4.5, fill: "#333", fontFamily: "monospace" }}>RUN: {st.tread}"</text>);

      } else {
        // Multi-run front elevation: show each run as a stringer box + landing platform
        var risersDrawn = 0;
        for (var ri = 0; ri < geom.runs.length; ri++) {
          var run = geom.runs[ri];
          var runTopY = dY + risersDrawn * risePerRiser;
          var runBotY = dY + (risersDrawn + run.risers) * risePerRiser;
          var platW = stW + 12;

          // Stringer outlines for this run
          stairEls.push(...singleRunFrontProfile(cx, stW, runTopY, runBotY, run.risers, run.treads, risePerRiser, treadPx, "r"+ri));

          risersDrawn += run.risers;

          if (ri < geom.runs.length - 1) {
            // Landing platform between runs
            var landY = dY + risersDrawn * risePerRiser;
            stairEls.push(<rect key={"land"+ri} x={cx-platW/2} y={landY-3} width={platW} height={6} fill="#e8e6d8" stroke="#444" strokeWidth="0.8" />);
            stairEls.push(<text key={"landlbl"+ri} x={cx} y={landY+1.5} textAnchor="middle" style={{ fontSize: 3.5, fill: "#555", fontFamily: "monospace" }}>LANDING</text>);
            // Landing posts
            stairEls.push(<line key={"lpl"+ri} x1={cx-platW/2+3} y1={landY+3} x2={cx-platW/2+3} y2={gnd} stroke="#c4a060" strokeWidth="1.5" />);
            stairEls.push(<line key={"lpr"+ri} x1={cx+platW/2-3} y1={landY+3} x2={cx+platW/2-3} y2={gnd} stroke="#c4a060" strokeWidth="1.5" />);
            // Landing footings
            stairEls.push(<rect key={"lpfl"+ri} x={cx-platW/2} y={gnd} width={6} height={3} fill="#c8c8c8" stroke="#444" strokeWidth="0.3" />);
            stairEls.push(<rect key={"lpfr"+ri} x={cx+platW/2-6} y={gnd} width={6} height={3} fill="#c8c8c8" stroke="#444" strokeWidth="0.3" />);
          }
        }
        // Rise/run callout
        stairEls.push(<text key="rrcall" x={cx+stW/2+6} y={dY+(gnd-dY)/2} style={{ fontSize: 4.5, fill: "#333", fontFamily: "monospace" }}>RISE: {Math.round(H/st.nRisers*12*10)/10}"</text>);
        stairEls.push(<text key="rrcall2" x={cx+stW/2+6} y={dY+(gnd-dY)/2+7} style={{ fontSize: 4.5, fill: "#333", fontFamily: "monospace" }}>RUN: {st.tread}"</text>);
      }

      // Stringer label
      stairEls.push(<text key="stlbl" x={cx} y={gnd+10} textAnchor="middle" style={{ fontSize: 4.5, fill: "#666", fontFamily: "monospace" }}>{st.totalStringers}x2x12 STRINGERS · {st.numRuns} RUN{st.numRuns>1?"S":""}</text>);

    } else {
      // SIDE ELEVATION - proper stepped profile
      const dir = effectiveSideDir === "right" ? 1 : -1;
      const startX = effectiveSideDir === "right" ? dX + dSW : dX;

      if (!geom || geom.runs.length <= 1) {
        // Single run stepped profile
        var pts = [];
        var curX = startX; var curY = dY;
        pts.push(curX + "," + curY);
        for (var i = 0; i < st.nRisers; i++) {
          var nextY = curY + risePerRiser;
          pts.push(curX + "," + nextY);
          if (i < st.nTreads) { curX += dir * treadPx; pts.push(curX + "," + nextY); }
          curY = nextY;
        }
        stairEls.push(<polyline key="profile" points={pts.join(" ")} fill="none" stroke="#444" strokeWidth="1" />);
        // Close the profile box
        stairEls.push(<line key="profbot" x1={startX} y1={gnd} x2={curX} y2={gnd} stroke="#444" strokeWidth="0.8" />);
        stairEls.push(<line key="profvert" x1={curX} y1={curY} x2={curX} y2={gnd} stroke="#444" strokeWidth="0.8" />);
        // Stringer diagonal
        stairEls.push(<line key="strdiag" x1={startX} y1={dY} x2={curX} y2={gnd} stroke="#888" strokeWidth="0.6" strokeDasharray="2,1.5" />);
        // Handrail
        stairEls.push(<line key="hr" x1={startX} y1={dY-8} x2={curX} y2={gnd-8} stroke="#666" strokeWidth="0.6" strokeDasharray="2,1" />);
        stairEls.push(<line key="hrpost1" x1={startX} y1={dY} x2={startX} y2={dY-8} stroke="#666" strokeWidth="0.5" />);
        stairEls.push(<line key="hrpost2" x1={curX} y1={gnd} x2={curX} y2={gnd-8} stroke="#666" strokeWidth="0.5" />);
        // Rise/run callout
        stairEls.push(<text key="rrcall" x={startX+dir*20} y={dY+(gnd-dY)*0.4} textAnchor="middle" style={{ fontSize: 4, fill: "#333", fontFamily: "monospace" }}>RISE: {Math.round(H/st.nRisers*12*10)/10}"</text>);
        stairEls.push(<text key="rrcall2" x={startX+dir*20} y={dY+(gnd-dY)*0.4+6} textAnchor="middle" style={{ fontSize: 4, fill: "#333", fontFamily: "monospace" }}>RUN: {st.tread}"</text>);

      } else {
        // Multi-run side profile
        var risersDrawn2 = 0;
        var curX2 = startX; var curDir = dir;
        for (var ri = 0; ri < geom.runs.length; ri++) {
          var run2 = geom.runs[ri];
          var runStartY2 = dY + risersDrawn2 * risePerRiser;
          var pts2 = [curX2 + "," + runStartY2];
          var rx = curX2; var ry = runStartY2;
          for (var i = 0; i < run2.risers; i++) {
            var ny2 = ry + risePerRiser;
            pts2.push(rx + "," + ny2);
            if (i < run2.treads) { rx += curDir * treadPx; pts2.push(rx + "," + ny2); }
            ry = ny2;
          }
          stairEls.push(<polyline key={"run"+ri} points={pts2.join(" ")} fill="none" stroke="#444" strokeWidth="1" />);
          risersDrawn2 += run2.risers;
          if (ri < geom.runs.length - 1) {
            var landingY3 = dY + risersDrawn2 * risePerRiser;
            var ldepth = (geom.landingDepth || st.width || 4) * sX;
            stairEls.push(<rect key={"slp"+ri} x={Math.min(rx, rx+curDir*ldepth)} y={landingY3-3} width={Math.abs(ldepth)} height={6} fill="#e8e6d8" stroke="#444" strokeWidth="0.8" />);
            stairEls.push(<text key={"slbl"+ri} x={rx+curDir*ldepth/2} y={landingY3+1.5} textAnchor="middle" style={{ fontSize: 3.5, fill: "#555", fontFamily: "monospace" }}>LANDING</text>);
            var postX3 = rx + curDir * ldepth / 2;
            stairEls.push(<line key={"slpost"+ri} x1={postX3} y1={landingY3+3} x2={postX3} y2={gnd} stroke="#c4a060" strokeWidth="1.5" />);
            stairEls.push(<rect key={"slpf"+ri} x={postX3-3} y={gnd} width={6} height={3} fill="#c8c8c8" stroke="#444" strokeWidth="0.3" />);
            rx += curDir * ldepth;
            curDir = -curDir;
          }
        }
        // Close bottom
        stairEls.push(<line key="profbot2" x1={startX} y1={gnd} x2={curX2} y2={gnd} stroke="#444" strokeWidth="0.5" strokeDasharray="2,1" />);
      }
      stairEls.push(<text key="stlbl" x={startX+dir*18} y={gnd+10} textAnchor="middle" style={{ fontSize: 4.5, fill: "#666", fontFamily: "monospace" }}>{st.totalStringers}x2x12 STRINGERS · {st.numRuns} RUN{st.numRuns>1?"S":""}</text>);
    }
  }

  return (
    <svg viewBox={(-leftOverhang) + " 0 " + svgW + " " + svgH} style={{ width: "100%", height: "auto" }}>
      {/* House */}
      <rect x={hX} y={hTop} width={hW} height={fndH} fill="#c8c8c8" stroke="#444" strokeWidth="1" />
      <rect x={hX} y={hTop} width={hW} height={f1H} fill="#e8e6e0" stroke="#444" strokeWidth="1" />
      {f2H > 0 && <rect x={hX} y={hTop+fndH+f1H} width={hW} height={f2H} fill="#e8e6e0" stroke="#444" strokeWidth="1" />}
      {[0.08,0.42,0.72].map((wx,i) => <rect key={i} x={hX+hW*wx} y={hTop+fndH+f1H*0.2} height={f1H*0.45} width={hW*0.12} fill="#b0d4e8" stroke="#444" strokeWidth="0.5" rx="0.5" />)}
      <polygon points={hX+","+hTop+" "+(hX+hW/2)+","+(hTop-roofPk)+" "+(hX+hW)+","+hTop} fill="#888" stroke="#444" strokeWidth="1.5" />
      <text x={hX+hW/2} y={hTop-roofPk/3} textAnchor="middle" style={{ fontSize: 6, fill: "#aaa", fontFamily: "monospace" }}>EXISTING HOUSE</text>

      {/* Ground line + hatch */}
      <line x1={pad-15} y1={gnd} x2={svgW-15} y2={gnd} stroke="#444" strokeWidth="1" />
      {Array.from({ length: Math.ceil((svgW-30)/3) }, (_,i) => <line key={i} x1={pad-15+i*3} y1={gnd} x2={pad-17+i*3} y2={gnd+2} stroke="#aaa" strokeWidth="0.3" />)}

      {/* Posts + pier footings */}
      {pp.map((px, i) => {
        const sx = dX + px * sX;
        return (
          <g key={i}>
            <line x1={sx} y1={dY} x2={sx} y2={gnd-2} stroke="#c4a060" strokeWidth={postSize==="6x6"?3:2} />
            <rect x={sx-3.5} y={gnd-2} width={7} height={2} fill="#888" stroke="#555" strokeWidth="0.4" />
            <rect x={sx-5} y={gnd} width={10} height={4} fill="#c8c8c8" stroke="#444" strokeWidth="0.5" />
            <line x1={sx} y1={gnd+4} x2={sx} y2={gnd+10} stroke="#888" strokeWidth="0.5" strokeDasharray="1.5,1" />
          </g>
        );
      })}

      {/* Beam — dropped=solid rect below deck, flush=single dashed hidden line at beam bottom per IRC blueprint convention */}
      { p.beamType === 'flush'
        ? <line x1={dX+1*sX} y1={dY} x2={dX+dSW-1*sX} y2={dY} stroke="#c4960a" strokeWidth="1.2" strokeDasharray="8,4" />
        : <rect x={dX+1*sX} y={dY+1} width={dSW-2*sX} height={bH*0.7} fill="#c4960a" fillOpacity="0.85" stroke="#444" strokeWidth="0.8" rx="0.5" />
      }
      {/* Deck surface */}
      <line x1={dX} y1={dY} x2={dX+dSW} y2={dY} stroke="#685340" strokeWidth="2.5" />
      <line x1={dX} y1={rTop} x2={dX+dSW} y2={rTop} stroke="#333" strokeWidth="2" />
      <line x1={dX} y1={dY-2} x2={dX+dSW} y2={dY-2} stroke="#333" strokeWidth="0.8" />
      {Array.from({ length: Math.ceil(W/4)+1 }, (_,i) => i*4*sX).filter(x => x<=dSW).map((x,i) => <line key={i} x1={dX+x} y1={dY-2} x2={dX+x} y2={rTop} stroke="#333" strokeWidth="1" />)}

      {/* Stair elements */}
      {stairEls}

      {/* Height dimension */}
      <line x1={dX-18} y1={gnd} x2={dX-12} y2={gnd} stroke="#1565c0" strokeWidth="0.5" />
      <line x1={dX-18} y1={dY} x2={dX-12} y2={dY} stroke="#1565c0" strokeWidth="0.5" />
      <line x1={dX-18} y1={gnd} x2={dX-18} y2={dY} stroke="#1565c0" strokeWidth="0.5" />
      <line x1={dX-19} y1={gnd} x2={dX-17} y2={gnd} stroke="#1565c0" strokeWidth="0.5" />
      <line x1={dX-19} y1={dY} x2={dX-17} y2={dY} stroke="#1565c0" strokeWidth="0.5" />
      <text x={dX-22} y={(gnd+dY)/2+2} textAnchor="middle" transform={"rotate(-90,"+(dX-22)+","+(gnd+dY)/2+")"} style={{ fontSize: 8, fill: "#1565c0", fontWeight: 800, fontFamily: "monospace" }}>{Math.floor(H)}'-{Math.round((H%1)*12)}"</text>

      {/* Width dimension */}
      <line x1={dX} y1={rTop-10} x2={dX+dSW} y2={rTop-10} stroke="#c62828" strokeWidth="0.5" />
      <line x1={dX} y1={rTop-13} x2={dX} y2={rTop-7} stroke="#c62828" strokeWidth="0.5" />
      <line x1={dX+dSW} y1={rTop-13} x2={dX+dSW} y2={rTop-7} stroke="#c62828" strokeWidth="0.5" />
      <text x={dX+dSW/2} y={rTop-13} textAnchor="middle" style={{ fontSize: 8, fill: "#c62828", fontWeight: 800, fontFamily: "monospace" }}>{W}'-0"</text>

      {/* Callout labels */}
      <line x1={dX+dSW} y1={rTop+2} x2={dX+dSW+9} y2={rTop+4} stroke="#999" strokeWidth="0.4" />
      <text x={dX+dSW+10} y={rTop+5} style={{ fontSize: 5, fill: "#333", fontFamily: "monospace" }}>36" GUARD RAIL</text>
      <line x1={dX+dSW} y1={dY+bH*0.3} x2={dX+dSW+9} y2={dY+bH*0.4+2} stroke="#999" strokeWidth="0.4" />
      <text x={dX+dSW+10} y={dY+bH*0.4+3} style={{ fontSize: 5, fill: "#333", fontFamily: "monospace" }}>{p.beamType === 'flush' ? beamSize.toUpperCase() + ' FLUSH BEAM' : beamSize.toUpperCase()}</text>
      <line x1={dX+dSW} y1={(gnd+dY)/2} x2={dX+dSW+9} y2={(gnd+dY)/2} stroke="#999" strokeWidth="0.4" />
      <text x={dX+dSW+10} y={(gnd+dY)/2+1} style={{ fontSize: 5, fill: "#333", fontFamily: "monospace" }}>{postSize} POSTS ({nP})</text>
      <line x1={dX+dSW} y1={gnd} x2={dX+dSW+9} y2={gnd+4} stroke="#999" strokeWidth="0.4" />
      <text x={dX+dSW+10} y={gnd+5} style={{ fontSize: 5, fill: "#333", fontFamily: "monospace" }}>{fDiam}" Ø x {fDepth}" PIERS</text>
      {/* View label */}
      {(() => {
        const lbl = isFront ? "FRONT ELEVATION" : (effectiveSideDir === "right" ? "RIGHT SIDE ELEVATION" : "LEFT SIDE ELEVATION");
        return <text x={dX + dSW/2} y={svgH - 6} textAnchor="middle" style={{ fontSize: 6, fill: "#555", fontFamily: "monospace", fontWeight: 800, letterSpacing: 1 }}>{lbl}</text>;
      })()}

      {/* Plan-view stair thumbnail inset - bottom right corner */}
      {hasSt && (() => {
        const tw = 80; const th = 60;
        const tx = svgW - tw - 8; const ty = svgH - th - 8;
        const tsc = Math.min((tw - 16) / Math.max(W, 1), (th - 16) / Math.max(D + (st.nTreads * st.tread/12), 1));
        const tdW = W * tsc; const tdD = D * tsc;
        const tox = tx + (tw - tdW) / 2; const toy = ty + 8;
        const stW2 = st.width * tsc;
        const treadD = (st.tread / 12) * tsc;
        const tmpl = p.stairTemplate || "straight";
        const stairEls2 = [];

        // Deck rectangle
        stairEls2.push(<rect key="td" x={tox} y={toy} width={tdW} height={tdD} fill="#e8f4e8" stroke="#444" strokeWidth="0.8" />);
        // House line at top
        stairEls2.push(<line key="th" x1={tox} y1={toy} x2={tox+tdW} y2={toy} stroke="#888" strokeWidth="1.5" />);

        const loc = p.stairLocation;
        const stCx = tox + tdW/2 + (p.stairOffset||0)*tsc;
        const stLeft = stCx - stW2/2; const stRight = stCx + stW2/2;
        const nT = st.nTreads;
        const runD = nT * treadD;

        if (tmpl === "straight" || tmpl === "wideLanding") {
          if (loc === "front") {
            for (var i=0;i<=nT;i++) stairEls2.push(<line key={"tt"+i} x1={stLeft} y1={toy+tdD+i*treadD} x2={stRight} y2={toy+tdD+i*treadD} stroke="#666" strokeWidth="0.5" />);

        const rx1 = hX - ov, rx2 = hX + hW + ov, rxM = hX + hW / 2;
        const ry = hH, ryP = hH + rpk, rz1 = hZ - 1, rz2 = hZ + hD + 1;
        const rv = new Float32Array([rx1,ry,rz2,rx2,ry,rz2,rxM,ryP,rz2, rx2,ry,rz1,rx1,ry,rz1,rxM,ryP,rz1, rx1,ry,rz1,rx1,ry,rz2,rxM,ryP,rz2,rx1,ry,rz1,rxM,ryP,rz2,rxM,ryP,rz1, rx2,ry,rz2,rx2,ry,rz1,rxM,ryP,rz1,rx2,ry,rz2,rxM,ryP,rz1,rxM,ryP,rz2, rx1,ry,rz1,rx2,ry,rz1,rx2,ry,rz2,rx1,ry,rz1,rx2,ry,rz2,rx1,ry,rz2]);
        const rg = new THREE.BufferGeometry(); rg.setAttribute('position', new THREE.BufferAttribute(rv, 3)); rg.computeVertexNormals();
        const roofM = new THREE.Mesh(rg, mats.roof); roofM.castShadow = true; scene.add(roofM);

        // Windows + door
        for (let wx = 0.2; wx < 0.9; wx += 0.3) { const wn = new THREE.Mesh(new THREE.PlaneGeometry(3, 4), mats.win); wn.position.set(hX + hW * wx, H + 5, hZ + hD + 0.05); scene.add(wn); }

        // Posts
        const pDim = postSize === "6x6" ? 5.5 / 12 : 3.5 / 12;
        const postG = new THREE.BoxGeometry(pDim, H, pDim);
        pp.forEach(px => { const po = new THREE.Mesh(postG, mats.post); po.position.set(cx + px, H / 2, cz + D - 1.5); po.castShadow = true; scene.add(po); });

        pp.forEach(px => { const ca = new THREE.Mesh(capG, mats.metal); ca.position.set(cx + px, H, cz + D - 1.5); scene.add(ca); });

        const bH2 = 11.875 / 12, bW2 = beamSize.includes("3") ? 5.25 / 12 : 3.5 / 12;

        ld.position.set(cx + W / 2, H - 0.4, cz + 0.06); scene.add(ld);

        for (let x = sp / 12; x < W; x += sp / 12) { const j = new THREE.Mesh(jG, mats.joist); j.position.set(cx + x, H - jH2 / 2 - 0.1, cz + jLen / 2); scene.add(j); }

        // Rim joists
        const rimF = new THREE.Mesh(new THREE.BoxGeometry(W, jH2, jW2), mats.joist);
        rimF.position.set(cx + W / 2, H - jH2 / 2 - 0.1, cz + D); scene.add(rimF);
        [0, W].forEach(x => { const rim = new THREE.Mesh(new THREE.BoxGeometry(jW2, jH2, D), mats.joist); rim.position.set(cx + x, H - jH2 / 2 - 0.1, cz + D / 2); scene.add(rim); });

        // Decking boards
        const bdW = 5.5 / 12, bdH = 1 / 12;
        const bdG = new THREE.BoxGeometry(bdW - 0.02, bdH, D + 0.1);
        for (let x = bdW / 2; x < W; x += bdW) { const b = new THREE.Mesh(bdG, mats.deck); b.position.set(cx + x, H + bdH / 2, cz + D / 2); b.receiveShadow = true; scene.add(b); }

        // Railing - top + bottom rails
        const rH = 3, trY = H + bdH + rH, brY = H + bdH + 0.25;
        [[new THREE.BoxGeometry(W, 0.1, 0.08), cx + W / 2, trY, cz + D], [new THREE.BoxGeometry(0.08, 0.1, D), cx, trY, cz + D / 2], [new THREE.BoxGeometry(0.08, 0.1, D), cx + W, trY, cz + D / 2]].forEach(([g, x, y, z]) => { const r = new THREE.Mesh(g, mats.rail); r.position.set(x, y, z); scene.add(r); });
        [[new THREE.BoxGeometry(W, 0.06, 0.06), cx + W / 2, brY, cz + D], [new THREE.BoxGeometry(0.06, 0.06, D), cx, brY, cz + D / 2], [new THREE.BoxGeometry(0.06, 0.06, D), cx + W, brY, cz + D / 2]].forEach(([g, x, y, z]) => { const r = new THREE.Mesh(g, mats.rail); r.position.set(x, y, z); scene.add(r); });

        // Balusters
        const balG = new THREE.BoxGeometry(0.04, rH - 0.3, 0.04);
        for (let x = 0; x < W; x += 3.75 / 12) { const b = new THREE.Mesh(balG, mats.rail); b.position.set(cx + x, H + bdH + rH / 2 + 0.1, cz + D); scene.add(b); }
        for (let z = 0; z < D; z += 3.75 / 12) { [cx, cx + W].forEach(x => { const b = new THREE.Mesh(balG, mats.rail); b.position.set(x, H + bdH + rH / 2 + 0.1, cz + z); scene.add(b); }); }

        // Corner posts
        const crnG = new THREE.BoxGeometry(0.2, rH + 0.2, 0.2);
        [[cx, cz], [cx + W, cz], [cx, cz + D], [cx + W, cz + D]].forEach(([x, z]) => { const cp = new THREE.Mesh(crnG, mats.rail); cp.position.set(x, H + bdH + rH / 2, z); scene.add(cp); });

        // Camera - zoomed out for full project overview
        const maxDim = Math.max(W, D, H * 2, hW);
        const dist = maxDim * 1.6;
        const theta = 0.7, phi = 0.55;
        const lookY = H * 0.6;
        cam.position.set(dist * Math.sin(phi) * Math.cos(theta), dist * Math.cos(phi) + lookY, dist * Math.sin(phi) * Math.sin(theta));
        cam.lookAt(0, lookY, 0);

        ren.render(scene, cam);
        const dataUrl = ren.domElement.toDataURL("image/jpeg", 0.85);
        ren.dispose();
        resolve(dataUrl.split(",")[1]);
      } catch (e) { console.warn("3D capture failed:", e); resolve(null); }
    });

                    </div>
                    <div style={{ padding: 8, height: 130, display: "grid", gridTemplateColumns: "1fr 1fr", gridTemplateRows: "1fr 1fr", gap: 4 }}>
                      {[
                        { t: "LEDGER DETAIL", lines: [[10, 30, 10, 80], [10, 30, 60, 30], [20, 30, 20, 80], [30, 35, 30, 75], [40, 35, 40, 75]] },
                        { t: "FOOTING DETAIL", lines: [[25, 20, 25, 70], [45, 20, 45, 70], [25, 70, 45, 70], [30, 15, 40, 15], [30, 15, 30, 20], [40, 15, 40, 20]] },
                        { t: "GUARD RAIL", lines: [[5, 65, 65, 65], [5, 15, 65, 15], [5, 15, 5, 65], [65, 15, 65, 65]] },
                        { t: "POST / BEAM", lines: [[25, 80, 25, 30], [45, 80, 45, 30], [10, 30, 60, 30], [10, 25, 60, 25]] },
                      ].map((detail, di) => (
                        <div key={di} style={{ background: "#fcfcfa", border: `0.5px solid ${br.bd}`, borderRadius: 3, position: "relative", overflow: "hidden" }}>
                          <svg viewBox="0 0 70 90" style={{ width: "100%", height: "100%" }}>
                            {detail.lines.map(([x1, y1, x2, y2], li) => <line key={li} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#bbb" strokeWidth="0.5" />)}
                            <text x="35" y="87" textAnchor="middle" style={{ fontSize: 4.5, fill: "#aaa", fontWeight: 600 }}>{detail.t}</text>
                          </svg>
                        </div>
                      ))}
                    </div>
                    <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, display: "flex", alignItems: "center", justifyContent: "center", pointerEvents: "none" }}>
                      <span style={{ fontSize: 22, fontWeight: 900, color: "rgba(61,90,46,0.08)", fontFamily: mono, transform: "rotate(-20deg)", letterSpacing: 4 }}>PREVIEW</span>
                    </div>
                  </div>
                </div>
                <div style={{ textAlign: "center", marginTop: 6 }}>
                  <span style={{ fontSize: 8, color: br.mu, fontFamily: mono }}>4 sheets included · Plan · Elevations · Details · Materials</span>
                </div>
              </div>

              {/* Summary + Structure */}
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit, minmax(200px, 1fr))", gap: 10, marginBottom: 14 }}>
                <div style={{ padding: 12, background: br.wr, borderRadius: 8, border: `1px solid ${br.bd}` }}>
                  <div style={{ fontSize: 9, fontWeight: 700, color: br.gn, marginBottom: 6, fontFamily: mono, letterSpacing: "1px", textTransform: "uppercase" }}>Project</div>
                  <Spec l="Size" v={`${c.W}'×${c.D}' (${c.area} SF)`} /><Spec l="Height" v={`${c.H}'`} /><Spec l="Attach" v={c.attachment === "ledger" ? "Ledger" : "Free"} /><Spec l="Stairs" v={p.hasStairs ? `${p.stairLocation} ${p.stairWidth || 4}' · ${p.numStringers || 3} stringers${p.hasLanding ? " · landing" : ""}` : "None"} /><Spec l="Deck" v={p.deckingType === "composite" ? "Composite" : "PT"} /><Spec l="Rail" v={p.railType === "fortress" ? "Fortress" : "Wood"} />
                </div>
                <div style={{ padding: 12, background: br.wr, borderRadius: 8, border: `1px solid ${br.bd}` }}>
                  <div style={{ fontSize: 9, fontWeight: 700, color: br.gn, marginBottom: 6, fontFamily: mono, letterSpacing: "1px", textTransform: "uppercase" }}>Structure</div>
                  <Spec l="Joists" v={`${c.joistSize}@${c.sp}"`} /><Spec l="Beam" v={c.beamSize.replace("3-ply ","3×").replace("2-ply ","2×")} /><Spec l="Posts" v={`${c.postSize}×${c.nP}`} /><Spec l="Footings" v={`${c.fDiam}"Ø×${c.nF}`} /><Spec l="Load" v={`${c.TL} PSF`} color={br.rd} />
                  {c.warnings.length > 0 && <div style={{ fontSize: 8, color: br.rd, marginTop: 4, fontFamily: mono }}>⚠️ {c.warnings.length} warning{c.warnings.length > 1 ? "s" : ""}</div>}
                </div>
              </div>

              {/* Project Info for Title Block */}
              <div style={{ padding: 14, background: br.wr, borderRadius: 8, border: `1px solid ${br.bd}`, marginBottom: 14 }}>
                <div style={{ fontSize: 9, fontWeight: 700, color: br.gn, marginBottom: 10, fontFamily: mono, letterSpacing: "1px", textTransform: "uppercase" }}>Project Information <span style={{ fontWeight: 400, color: br.mu, fontSize: 8 }}>(prints on title block)</span></div>
                {[
                  ["owner", "Owner / Applicant Name"],
                  ["address", "Project Address"],
                  ["city", "City"],
                ].map(([f, lbl]) => (
                  <div key={f} style={{ marginBottom: 8 }}>
                    <label style={{ fontSize: 9, color: br.mu, fontFamily: mono, display: "block", marginBottom: 2 }}>{lbl}</label>
                    <input value={info[f]} onChange={e => setI(f, e.target.value)} placeholder={lbl}
                      style={{ width: "100%", padding: "7px 10px", border: `1px solid ${br.bd}`, borderRadius: 5, fontSize: 12, fontFamily: mono, color: br.tx, background: "#fff", outline: "none" }} />
                  </div>
                ))}
                <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 9, color: br.mu, fontFamily: mono, display: "block", marginBottom: 2 }}>State</label>
                    <input value={info.state} onChange={e => setI("state", e.target.value)} placeholder="State"
                      style={{ width: "100%", padding: "7px 10px", border: `1px solid ${br.bd}`, borderRadius: 5, fontSize: 12, fontFamily: mono, color: br.tx, background: "#fff", outline: "none" }} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 9, color: br.mu, fontFamily: mono, display: "block", marginBottom: 2 }}>ZIP</label>
                    <input value={info.zip} onChange={e => setI("zip", e.target.value)} placeholder="ZIP"
                      style={{ width: "100%", padding: "7px 10px", border: `1px solid ${br.bd}`, borderRadius: 5, fontSize: 12, fontFamily: mono, color: br.tx, background: "#fff", outline: "none" }} />
                  </div>
                </div>
                <div style={{ display: "flex", gap: 8 }}>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 9, color: br.mu, fontFamily: mono, display: "block", marginBottom: 2 }}>Lot / Parcel #</label>
                    <input value={info.lot} onChange={e => setI("lot", e.target.value)} placeholder="Optional"
                      style={{ width: "100%", padding: "7px 10px", border: `1px solid ${br.bd}`, borderRadius: 5, fontSize: 12, fontFamily: mono, color: br.tx, background: "#fff", outline: "none" }} />
                  </div>
                  <div style={{ flex: 1 }}>
                    <label style={{ fontSize: 9, color: br.mu, fontFamily: mono, display: "block", marginBottom: 2 }}>Contractor</label>
                    <input value={info.contractor} onChange={e => setI("contractor", e.target.value)} placeholder="Owner-Builder"
                      style={{ width: "100%", padding: "7px 10px", border: `1px solid ${br.bd}`, borderRadius: 5, fontSize: 12, fontFamily: mono, color: br.tx, background: "#fff", outline: "none" }} />
                  </div>
                </div>
              </div>


              {/* Feedback Form (production domain only) */}
              {isProduction && !feedbackDone && <div style={{ padding: 16, background: "#fff8e1", borderRadius: 8, border: "1px solid #ffe082", marginBottom: 14 }}>
                <div style={{ fontSize: 10, fontWeight: 700, color: "#f57f17", fontFamily: mono, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 8 }}>Quick Feedback <span style={{ fontWeight: 400, color: "#ffa000", fontSize: 8 }}>(helps us build what you need)</span></div>
                <div style={{ marginBottom: 8 }}>
                  <label style={{ fontSize: 9, color: br.mu, fontFamily: mono, display: "block", marginBottom: 2 }}>I am a...</label>
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                    {[["diy", "DIY Homeowner"], ["contractor", "Contractor"], ["designer", "Designer"], ["other", "Other"]].map(([v, t]) => (
                      <button key={v} onClick={() => setFeedback(f => ({...f, role: v}))} style={{ padding: "5px 12px", borderRadius: 5, fontSize: 10, fontFamily: mono, cursor: "pointer", border: feedback.role === v ? "2px solid #f57f17" : "1px solid " + br.bd, background: feedback.role === v ? "#fff3e0" : "#fff", color: feedback.role === v ? "#e65100" : br.tx, fontWeight: feedback.role === v ? 700 : 400 }}>{t}</button>
                    ))}
                  </div>
                </div>
                <div style={{ marginBottom: 8 }}>
                  <label style={{ fontSize: 9, color: br.mu, fontFamily: mono, display: "block", marginBottom: 2 }}>How did you find us?</label>
                  <input value={feedback.source} onChange={e => setFeedback(f => ({...f, source: e.target.value}))} placeholder="Google, Reddit, friend, etc." style={{ width: "100%", padding: "6px 10px", border: "1px solid " + br.bd, borderRadius: 5, fontSize: 11, fontFamily: mono, color: br.tx, background: "#fff", outline: "none" }} />
                </div>
                <div style={{ marginBottom: 8 }}>
                  <label style={{ fontSize: 9, color: br.mu, fontFamily: mono, display: "block", marginBottom: 2 }}>What would you pay for this?</label>
                  <div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>
                    {[["$0", "$0"], ["$25-49", "$25\u201349"], ["$50-99", "$50\u201399"], ["$100+", "$100+"]].map(([v, t]) => (
                      <button key={v} onClick={() => setFeedback(f => ({...f, price: v}))} style={{ padding: "5px 12px", borderRadius: 5, fontSize: 10, fontFamily: mono, cursor: "pointer", border: feedback.price === v ? "2px solid #f57f17" : "1px solid " + br.bd, background: feedback.price === v ? "#fff3e0" : "#fff", color: feedback.price === v ? "#e65100" : br.tx, fontWeight: feedback.price === v ? 700 : 400 }}>{t}</button>
                    ))}
                  </div>
                </div>
                <div style={{ marginBottom: 8 }}>
                  <label style={{ fontSize: 9, color: br.mu, fontFamily: mono, display: "block", marginBottom: 2 }}>Anything confusing or missing? <span style={{ color: "#bbb" }}>(optional)</span></label>
                  <textarea value={feedback.feedback} onChange={e => setFeedback(f => ({...f, feedback: e.target.value}))} placeholder="Your thoughts..." rows={2} style={{ width: "100%", padding: "6px 10px", border: "1px solid " + br.bd, borderRadius: 5, fontSize: 11, fontFamily: mono, color: br.tx, background: "#fff", outline: "none", resize: "vertical" }} />
                </div>
                <div style={{ marginBottom: 10 }}>
                  <label style={{ fontSize: 9, color: br.mu, fontFamily: mono, display: "block", marginBottom: 2 }}>Email <span style={{ color: "#bbb" }}>(optional \u2014 for launch notification)</span></label>
                  <input type="email" value={feedback.email} onChange={e => setFeedback(f => ({...f, email: e.target.value}))} placeholder="you@example.com" style={{ width: "100%", padding: "6px 10px", border: "1px solid " + br.bd, borderRadius: 5, fontSize: 11, fontFamily: mono, color: br.tx, background: "#fff", outline: "none" }} />
                </div>
                <button onClick={submitFeedback} disabled={!feedback.role || !feedback.price} style={{ padding: "8px 20px", background: !feedback.role || !feedback.price ? "#ccc" : "#f57f17", border: "none", borderRadius: 6, color: "#fff", fontSize: 11, fontWeight: 700, cursor: !feedback.role || !feedback.price ? "default" : "pointer", fontFamily: mono }}>Submit Feedback</button>
                <span style={{ fontSize: 8, color: "#bbb", fontFamily: mono, marginLeft: 8 }}>Required to generate on this domain</span>
              </div>}
              {isProduction && feedbackDone && <div style={{ padding: 10, background: "#e8f5e9", borderRadius: 8, border: "1px solid #c8e6c9", marginBottom: 14, textAlign: "center" }}>
                <span style={{ fontSize: 11, color: "#2e7d32", fontFamily: mono, fontWeight: 700 }}>\u2713 Thanks for your feedback!</span>
              </div>}

              {/* Price + CTA */}
              <div style={{ padding: 16, background: "#e8f5e9", borderRadius: 8, border: "1px solid #c8e6c9", textAlign: "center", marginBottom: 10 }}>
                <div style={{ fontSize: 10, fontFamily: mono, color: br.gn, fontWeight: 700, letterSpacing: "1px", textTransform: "uppercase" }}>Estimated Materials</div>
                <div style={{ fontSize: 36, fontWeight: 900, color: br.gn, fontFamily: mono }}>${m.total.toFixed(0)}</div>
                <div style={{ fontSize: 10, color: "#66bb6a", fontFamily: mono }}>Includes tax + 5% contingency</div>
              </div>

              <div style={{ background: br.dk, borderRadius: 10, padding: 20, textAlign: "center", marginBottom: 10 }}>
                <div style={{ fontSize: 10, fontFamily: mono, color: "rgba(255,255,255,0.5)", letterSpacing: "2px", textTransform: "uppercase", marginBottom: 6 }}>Your Blueprint Package</div>
                <div style={{ display: "flex", justifyContent: "center", gap: 16, marginBottom: 12, flexWrap: "wrap" }}>
                  {["Plan View", "Framing Plan", "Elevations", "Details", "Material List"].map(s => (
                    <div key={s} style={{ display: "flex", alignItems: "center", gap: 4 }}>
                      <span style={{ color: "#66bb6a", fontSize: 11 }}>✓</span>
                      <span style={{ fontSize: 10, fontFamily: mono, color: "rgba(255,255,255,0.8)" }}>{s}</span>
                    </div>
                  ))}
                </div>
                {user ? <>
                <button
                  onClick={generateBlueprint}
                  disabled={genStatus === "generating" || (isProduction && !feedbackDone)}
                  style={{ padding: "14px 40px", background: genStatus === "generating" ? "#555" : genStatus === "done" ? "#2e7d32" : br.gn, color: "#fff", border: "none", borderRadius: 8, fontSize: 16, fontWeight: 800, cursor: genStatus === "generating" ? "wait" : "pointer", fontFamily: mono, letterSpacing: "1px", boxShadow: "0 4px 20px rgba(61,90,46,0.4)", transition: "all 0.2s" }}>
                  {genStatus === "generating" ? "Generating PDF..." : genStatus === "done" ? "✓ Download Complete — Generate Again?" : "Generate Blueprint — FREE BETA"}
                </button>
                {genStatus === "error" && <div style={{ fontSize: 10, color: "#f44336", fontFamily: mono, marginTop: 8 }}>Error: {genError}</div>}
                <div style={{ fontSize: 8, color: "rgba(255,255,255,0.4)", fontFamily: mono, marginTop: 8 }}>
                  {genStatus === "done" ? "PDF opened in new tab · Check your downloads" : "Instant PDF download · Print-ready quality · Permit-office format"}
                </div>
                </> : <div style={{ textAlign: "center" }}>
                  <div style={{ fontSize: 11, color: "rgba(255,255,255,0.6)", fontFamily: mono, marginBottom: 12 }}>Sign in to generate your blueprint</div>
                  <button onClick={() => { window.location.href = `${API}/auth/login`; }} style={{ padding: "12px 32px", background: "#fff", color: "#333", border: "none", borderRadius: 8, fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: mono, display: "inline-flex", alignItems: "center", gap: 10, boxShadow: "0 2px 12px rgba(0,0,0,0.15)" }}>
                    <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#4285F4" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#34A853" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59a14.5 14.5 0 010-9.18l-7.98-6.19a24.04 24.04 0 000 21.56l7.98-6.19z"/><path fill="#EA4335" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                    Sign in with Google
                  </button>
                </div>}
              </div>
            </>}

            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20 }}>
              <button onClick={() => step > 0 ? setStep(step - 1) : setPage("home")} style={{ padding: "9px 18px", border: `1px solid ${br.bd}`, borderRadius: 6, background: "transparent", color: br.mu, cursor: "pointer", fontFamily: mono, fontSize: 11, fontWeight: 600 }}>← {step > 0 ? "Back" : "Home"}</button>
              {step < 3 && <button onClick={() => setStep(step + 1)} style={{ padding: "9px 18px", border: "none", borderRadius: 6, background: br.gn, color: "#fff", cursor: "pointer", fontFamily: mono, fontSize: 11, fontWeight: 700 }}>Next →</button>}
            </div>
          </div>
        </div>

        {/* RIGHT: PREVIEW */}
        <div style={{ flex: "1 1 500px", minWidth: 280 }}>
          <div style={{ background: "#fff", borderRadius: 10, padding: 18, border: `1px solid ${br.bd}`, boxShadow: "0 1px 8px rgba(0,0,0,0.04)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <h3 style={{ margin: 0, fontSize: 12, fontWeight: 700, color: br.dk, fontFamily: mono, letterSpacing: "1px", textTransform: "uppercase" }}>Preview</h3>
              <div style={{ display: "flex", gap: 1 }}>
                {views.map(([id, label], i) => <button key={id} onClick={() => setView(id)} style={{ padding: "5px 12px", fontSize: 10, cursor: "pointer", fontFamily: mono, border: view === id ? `1px solid ${br.gn}` : `1px solid ${br.bd}`, background: view === id ? br.gn : "transparent", color: view === id ? "#fff" : br.mu, borderRadius: i === 0 ? "4px 0 0 4px" : i === views.length - 1 ? "0 4px 4px 0" : 0, fontWeight: view === id ? 700 : 400 }}>{label}</button>)}
              </div>
            </div>

            <div style={{ background: view === "3d" ? "transparent" : br.cr, border: view === "3d" ? "none" : `1px solid ${br.bd}`, borderRadius: 6, padding: view === "3d" ? 0 : 12, minHeight: 320 }}>
              {view === "plan" && <>
                <div style={{ display: "flex", gap: 4, marginBottom: 8 }}>
                  {[["plan", "Deck Plan"], ["framing", "Framing"]].map(([id, label]) => <button key={id} onClick={() => setPlanMode(id)} style={{ padding: "4px 10px", fontSize: 9, fontFamily: mono, cursor: "pointer", border: planMode === id ? `1px solid ${br.gn}` : `1px solid ${br.bd}`, background: planMode === id ? br.gn : "transparent", color: planMode === id ? "#fff" : br.mu, borderRadius: 4, fontWeight: planMode === id ? 700 : 400 }}>{label}</button>)}
                </div>
                <PlanView p={p} c={c} mode={planMode} u={u} />
                {planMode === "plan" && <div style={{ textAlign: "center", fontSize: 9, color: br.mu, fontFamily: mono, marginTop: 4, opacity: 0.7 }}>
                  Drag the <span style={{ color: "#3d5a2e", fontWeight: 700 }}>green</span> handle to slide the deck · Click <span style={{ color: "#c62828", fontWeight: 700 }}>stairs</span> to select, drag to move, grab <span style={{ color: "#3d5a2e", fontWeight: 700 }}>↻</span> to rotate
                </div>}
              </>}
              {view === "elevation" && <ElevationView c={c} p={p} />}
              {view === "3d" && <Deck3D c={c} p={p} />}
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 6, marginTop: 12 }}>
              {[["Area", `${c.area} SF`, br.dk], ["Joists", c.joistSize, br.bl], ["Beam", c.beamSize.replace("3-ply ", "3×").replace("2-ply ", "2×"), br.ac], ["Posts", `${c.postSize}×${c.nP}`, "#8B6508"], ["Footings", `${c.fDiam}"Ø`, "#777"], ["Est. Cost", `$${m.total.toFixed(0)}`, br.gn]].map(([l, v, cl]) => (
                <div key={l} style={{ padding: "8px 10px", background: br.cr, borderRadius: 6, border: `1px solid ${br.bd}`, textAlign: "center" }}>
                  <div style={{ fontSize: 8, color: br.mu, fontFamily: mono, textTransform: "uppercase", letterSpacing: "0.5px" }}>{l}</div>
                  <div style={{ fontSize: 11, fontWeight: 800, color: cl, fontFamily: mono, marginTop: 1 }}>{v}</div>
                </div>
              ))}
            </div>

            {step >= 2 && <div style={{ marginTop: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: br.mu, fontFamily: mono, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 6 }}>Materials</div>
              <div style={{ maxHeight: 200, overflowY: "auto", borderRadius: 6, border: `1px solid ${br.bd}` }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: mono, fontSize: 10 }}>
                  <thead><tr style={{ background: br.wr }}><th style={{ textAlign: "left", padding: "5px 8px", color: br.mu, fontSize: 8 }}>ITEM</th><th style={{ textAlign: "center", padding: "5px 8px", color: br.mu, fontSize: 8 }}>QTY</th><th style={{ textAlign: "right", padding: "5px 8px", color: br.mu, fontSize: 8 }}>EXT</th></tr></thead>
                  <tbody>{m.items.map((it, i) => <tr key={i} style={{ borderBottom: `1px solid ${br.wr}` }}><td style={{ padding: "4px 8px", color: br.tx }}>{it.item}</td><td style={{ padding: "4px 8px", textAlign: "center", color: br.bl, fontWeight: 700 }}>{it.qty}</td><td style={{ padding: "4px 8px", textAlign: "right", color: br.dk }}>${(it.qty * it.cost).toFixed(0)}</td></tr>)}</tbody>
                </table>
              </div>
            </div>}
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script></body></html>
