<script>
(function() {
  var loaded = false;
  var loading = false;
  var callbacks = [];

  function loadScript(url) {
    return new Promise(function(resolve, reject) {
      var s = document.createElement("script");
      s.src = url;
      s.onload = resolve;
      s.onerror = reject;
      document.head.appendChild(s);
    });
  }

  function loadBabelScript(url) {
    return fetch(url)
      .then(function(r) { return r.text(); })
      .then(function(code) {
        var result = Babel.transform(code, { presets: ["react"] });
        var s = document.createElement("script");
        s.textContent = result.code;
        document.head.appendChild(s);
      });
  }

  window._wizardDepsReady = function() { return loaded; };

  window._loadWizardDeps = function() {
    if (loaded) return Promise.resolve();
    if (loading) return new Promise(function(resolve) { callbacks.push(resolve); });
    loading = true;

    var v = "v=s100b";
    return loadScript("https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js")
      .then(function() {
        // Views can load in parallel (stairGeometry + zoneUtils already loaded)
        return Promise.all([
          loadBabelScript("/static/js/planView.js?" + v),
          loadBabelScript("/static/js/elevationView.js?" + v),
          loadBabelScript("/static/js/deck3d.js?" + v),
          loadBabelScript("/static/js/sitePlanView.js?" + v),
          loadBabelScript("/static/js/traceView.js?" + v),
        ]);
      })
      .then(function() {
        // Steps depends on everything above
        return loadBabelScript("/static/js/steps.js?" + v);
      })
      .then(function() {
        loaded = true;
        loading = false;
        callbacks.forEach(function(cb) { cb(); });
        callbacks = [];
      })
      .catch(function(e) {
        loading = false;
        console.error("Failed to load wizard deps:", e);
        throw e;
      });
  };
})();
