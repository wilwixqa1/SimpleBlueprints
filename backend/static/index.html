<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimpleBlueprints — Permit-Ready Deck Plans in Minutes</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%233d5a2e'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='16' font-weight='900' font-family='monospace'>SB</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,700;0,9..40,900;1,9..40,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', system-ui, sans-serif; background: #faf8f3; -webkit-font-smoothing: antialiased; }
  #root { min-height: 100vh; }
  input[type="range"] { -webkit-appearance: none; height: 6px; border-radius: 3px; background: #ddd8cc; outline: none; }
  input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #3d5a2e; cursor: pointer; }
  input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo, useEffect, useRef } = React;
// THREE loaded via CDN

// ============================================================
// LOAD-TIERED IRC SPAN TABLES (matches Python engine)
// ============================================================
const JOIST_SPANS = {
  50: { "2x6": { 12: 9.5, 16: 8.5, 24: 7 }, "2x8": { 12: 12.5, 16: 11.5, 24: 9.5 }, "2x10": { 12: 16, 16: 14.5, 24: 12 }, "2x12": { 12: 19.5, 16: 17.5, 24: 14.5 } },
  60: { "2x6": { 12: 8.5, 16: 7.5, 24: 6 }, "2x8": { 12: 11, 16: 10, 24: 8.5 }, "2x10": { 12: 14, 16: 12.5, 24: 10.5 }, "2x12": { 12: 17, 16: 15.5, 24: 12.5 } },
  75: { "2x6": { 12: 7.5, 16: 6.5, 24: 5.5 }, "2x8": { 12: 10, 16: 9, 24: 7.5 }, "2x10": { 12: 12.5, 16: 11, 24: 9.5 }, "2x12": { 12: 15, 16: 13.5, 24: 11 } },
  95: { "2x6": { 12: 6.5, 16: 5.5, 24: 4.5 }, "2x8": { 12: 8.5, 16: 7.5, 24: 6.5 }, "2x10": { 12: 11, 16: 9.5, 24: 8 }, "2x12": { 12: 13, 16: 11.5, 24: 9.5 } },
};

const FROST = { warm: 12, moderate: 24, cold: 36, severe: 48 };
const SNOW = { none: 0, light: 20, moderate: 40, heavy: 60 };

function getSpanTable(TL) {
  for (const tier of [50, 60, 75, 95]) { if (TL <= tier) return JOIST_SPANS[tier]; }
  return JOIST_SPANS[95];
}

function calcStructure(p) {
  const { width: W, depth: D, height: H, joistSpacing: sp, attachment, snowLoad, frostZone, deckingType } = p;
  const area = W * D;
  const LL = 40 + (SNOW[snowLoad] || 0);
  const DL = deckingType === "composite" ? 15 : 12;
  const TL = LL + DL;
  const jSpan = attachment === "ledger" ? D - 1.5 : D / 2 - 0.75;
  const table = getSpanTable(TL);

  // === JOISTS (overridable) ===
  let joistSize = "2x12";
  let joistAuto = true;
  for (const [sz, spans] of Object.entries(table)) { if ((spans[sp] || 0) >= jSpan) { joistSize = sz; break; } }
  const autoJoist = joistSize;
  if (p.overJoist) { joistSize = p.overJoist; joistAuto = false; }

  // === POSTS (overridable count) ===
  let nP = W <= 10 ? 2 : W <= 16 ? 3 : W <= 24 ? 3 : W <= 32 ? 4 : Math.max(4, Math.ceil(W / 10) + 1);
  const autoNP = nP;
  if (p.overPostCount) { nP = p.overPostCount; }
  const bSpan = W / (nP - 1);

  // === BEAM (overridable) ===
  let beamSize = "2-ply 2x10";
  if (bSpan > 8 || D > 10) beamSize = "3-ply 2x10";
  if (bSpan > 10 || D > 12) beamSize = "3-ply 2x12";
  if (bSpan > 12) beamSize = "3-ply LVL 1.75x12";
  const autoBeam = beamSize;
  if (p.overBeam) { beamSize = p.overBeam; }

  // === POST SIZE (overridable) ===
  let postSize = H > 8 ? "6x6" : (TL > 60 && H > 5 ? "6x6" : "4x4");
  const autoPostSize = postSize;
  if (p.overPostSize) { postSize = p.overPostSize; }

  const pp = []; for (let i = 0; i < nP; i++) pp.push(+(2 + i * (W - 4) / (nP - 1)).toFixed(2));
  const trib = (W / Math.max(nP - 1, 1)) * D;
  const reqD = Math.sqrt(trib * TL / 1500 / Math.PI) * 2 * 12;

  // === FOOTINGS (overridable) ===
  let fDiam = [12, 16, 18, 21, 24, 30].find(s => s >= reqD) || 30;
  const autoFDiam = fDiam;
  if (p.overFooting) { fDiam = p.overFooting; }
  const fDepth = FROST[frostZone] || 30;
  const nJ = Math.ceil(W / (sp / 12)) + 1;
  let railLen = W + D * 2; if (attachment === "freestanding") railLen += W;
  if (p.hasStairs) railLen -= 3;
  const totalPosts = attachment === "ledger" ? nP : nP * 2;
  let stairs = null;
  if (p.hasStairs && H > 0.5) {
    const stairW = p.stairWidth || 4;
    const nStringers = p.numStringers || 3;
    const nR = Math.ceil(H * 12 / 7.5); const aR = H * 12 / nR;
    const tR = (nR - 1) * 10.5;
    stairs = { nRisers: nR, nTreads: nR - 1, rise: +aR.toFixed(2), tread: 10.5, runFt: +(tR / 12).toFixed(1), stringerFt: +(Math.sqrt((H * 12) ** 2 + tR ** 2) / 12 + 1).toFixed(1), width: stairW, nStringers, hasLanding: !!p.hasLanding, location: p.stairLocation || "front" };
  }
  const warnings = [];
  const maxSpan = (table["2x12"] || {})[sp] || 0;
  if (jSpan > maxSpan) warnings.push(`Joist span (${jSpan.toFixed(1)}') exceeds IRC at ${TL} PSF. Engineering required.`);
  if (H > 10) warnings.push("Height >10'. Lateral bracing by engineer recommended.");
  if (area > 500) warnings.push("Area >500 SF. Check local permit requirements.");

  // Override warnings — warn if user picked something smaller than auto
  const joistRank = { "2x6": 0, "2x8": 1, "2x10": 2, "2x12": 3 };
  if (p.overJoist && (joistRank[p.overJoist] || 0) < (joistRank[autoJoist] || 0)) {
    warnings.push(`⬇ Joist override (${p.overJoist}) is smaller than recommended (${autoJoist}). May not meet code.`);
  }
  const beamRank = { "2-ply 2x8": 0, "2-ply 2x10": 1, "2-ply 2x12": 2, "3-ply 2x10": 3, "3-ply 2x12": 4, "3-ply LVL 1.75x12": 5 };
  if (p.overBeam && (beamRank[p.overBeam] || 0) < (beamRank[autoBeam] || 0)) {
    warnings.push(`⬇ Beam override (${p.overBeam}) is smaller than recommended (${autoBeam}). May not meet code.`);
  }
  if (p.overPostSize === "4x4" && autoPostSize === "6x6") {
    warnings.push(`⬇ Post override (4x4) is smaller than recommended (6x6). May not meet code.`);
  }
  if (p.overFooting && p.overFooting < autoFDiam) {
    warnings.push(`⬇ Footing override (${p.overFooting}") is smaller than recommended (${autoFDiam}"). May not meet code.`);
  }
  if (p.overPostCount && p.overPostCount < autoNP) {
    warnings.push(`⬇ Fewer posts (${p.overPostCount}) than recommended (${autoNP}). May not meet code.`);
  }

  return { W, D, H, area, LL, DL, TL, joistSize, sp, jSpan: +jSpan.toFixed(1), nJ, beamSize, bSpan: +bSpan.toFixed(1), postSize, nP, totalPosts, pp, fDiam, fDepth, nF: totalPosts, ledgerSize: joistSize, railLen: +railLen.toFixed(1), stairs, warnings, attachment,
    auto: { joist: autoJoist, beam: autoBeam, postSize: autoPostSize, postCount: autoNP, footing: autoFDiam }
  };
}

function estMaterials(p, c) {
  const items = [];
  const bags = Math.ceil((Math.PI * (c.fDiam / 24) ** 2 * (c.fDepth / 12)) / 0.6) * c.nF;
  items.push({ cat: "Foundation", item: "Concrete 80lb bags", qty: bags, cost: 6.5 });
  items.push({ cat: "Foundation", item: `Sonotube ${c.fDiam}"`, qty: c.nF, cost: c.fDiam > 18 ? 28 : 18 });
  items.push({ cat: "Foundation", item: "Post Base Hardware", qty: c.nF, cost: c.postSize === "6x6" ? 42 : 28 });
  items.push({ cat: "Posts", item: `${c.postSize} PT Posts`, qty: c.totalPosts, cost: c.postSize === "6x6" ? 48 : 24 });
  items.push({ cat: "Posts", item: "Post Cap Hardware", qty: c.totalPosts, cost: c.postSize === "6x6" ? 38 : 22 });
  const plies = parseInt(c.beamSize[0]); const isLVL = c.beamSize.includes("LVL");
  items.push({ cat: "Beam", item: isLVL ? "LVL 20'" : "PT Beam 20'", qty: Math.ceil(c.W / 20) * plies, cost: isLVL ? 95 : 55 });
  if (c.attachment === "ledger") {
    items.push({ cat: "Ledger", item: `${c.ledgerSize} PT Ledger`, qty: Math.ceil(c.W / 12), cost: 32 });
    items.push({ cat: "Ledger", item: "LedgerLok Screws (box)", qty: Math.ceil(c.W / (16 / 12) * 2 / 50), cost: 85 });
    items.push({ cat: "Ledger", item: "Flashing", qty: 1, cost: 55 });
  }
  const jL = Math.ceil(c.D);
  items.push({ cat: "Framing", item: `${c.joistSize} Joists ${jL}'`, qty: c.nJ + 4, cost: jL <= 10 ? 22 : jL <= 12 ? 32 : 42 });
  items.push({ cat: "Framing", item: "Rim Joists", qty: Math.ceil(c.W / 12) + 2, cost: 32 });
  items.push({ cat: "Hardware", item: "Joist Hangers", qty: c.nJ * 2, cost: 6 });
  items.push({ cat: "Hardware", item: "Hurricane Ties + Nails", qty: 1, cost: c.nJ * 2.75 + 50 });
  const bds = Math.ceil(c.W / (5.5 / 12)) * 1.1;
  if (p.deckingType === "composite") {
    items.push({ cat: "Decking", item: `Composite ${Math.ceil(c.D + 2)}'`, qty: Math.ceil(bds), cost: c.D <= 10 ? 28 : 38 });
    items.push({ cat: "Decking", item: "Hidden Fasteners", qty: 1, cost: 175 });
  } else {
    items.push({ cat: "Decking", item: `5/4x6 PT ${Math.ceil(c.D + 2)}'`, qty: Math.ceil(bds), cost: c.D <= 10 ? 12 : 18 });
    items.push({ cat: "Decking", item: "Deck Screws 5lb", qty: Math.ceil(c.W * c.D / 50), cost: 32 });
  }
  const rP = Math.ceil(c.railLen / 6) + 1;
  if (p.railType === "fortress") {
    items.push({ cat: "Railing", item: "Fortress Panels", qty: Math.ceil(c.railLen / 7), cost: 80 });
    items.push({ cat: "Railing", item: "Fortress Posts", qty: rP, cost: 45 });
    items.push({ cat: "Railing", item: "Top Rail + Brackets", qty: Math.ceil(c.railLen / 7), cost: 52 });
  } else {
    items.push({ cat: "Railing", item: "Wood Rail Kit (8')", qty: Math.ceil(c.railLen / 8), cost: 85 });
  }
  items.push({ cat: "Misc", item: "Joist Tape + Misc", qty: 1, cost: 120 });
  const sub = items.reduce((s, i) => s + i.qty * i.cost, 0);
  return { items, sub, tax: sub * 0.08, cont: sub * 0.05, total: sub * 1.13 };
}

// ============================================================
// PLAN VIEW SVG
// ============================================================
function PlanView({ p, c, mode }) {
  const pad = 45; const sc = Math.min(420 / Math.max(c.W, 16), 18);
  const sw = c.W * sc; const sd = c.D * sc; const bY = sd - 1.5 * sc;
  const svgW = sw + pad * 2 + 40; const svgH = sd + pad * 2 + 80;
  const jLines = []; if (mode === "framing") { const s = c.sp / 12 * sc; for (let x = s; x < sw - 1; x += s) jLines.push(x); }
  return (
    <svg viewBox={`0 0 ${svgW} ${svgH}`} style={{ width: "100%", height: "auto" }}>
      {(() => { const hw = (p.houseWidth || 40) * sc; const hx = pad + sw / 2 - hw / 2; return <>
        <rect x={hx} y={pad - 50} width={hw} height={50} fill="#e8e6e0" stroke="#444" strokeWidth="1.2" rx="1" />
        <text x={pad + sw / 2} y={pad - 25} textAnchor="middle" style={{ fontSize: 8, fill: "#999", fontFamily: "monospace", fontWeight: 600, letterSpacing: "1px" }}>EXISTING HOUSE</text>
      </>; })()}
      <rect x={pad} y={pad} width={sw} height={sd} fill={mode === "framing" ? "#fcfaf5" : "#efe5d5"} stroke="#333" strokeWidth="2" rx="1" />
      {mode === "plan" && Array.from({ length: Math.ceil(sd / (5.5 / 12 * sc)) }, (_, i) => i * 5.5 / 12 * sc).filter(y => y <= sd).map((y, i) => (
        <line key={i} x1={pad} y1={pad + y} x2={pad + sw} y2={pad + y} stroke="#c9ad7a" strokeWidth="0.3" />
      ))}
      {c.attachment === "ledger" && <><line x1={pad} y1={pad} x2={pad + sw} y2={pad} stroke="#2e7d32" strokeWidth="3.5" />
        <text x={pad + sw / 2} y={pad - 5} textAnchor="middle" style={{ fontSize: 5, fill: "#2e7d32", fontWeight: 700, fontFamily: "monospace" }}>LEDGER</text></>}
      {mode === "framing" && <>
        {jLines.map((x, i) => <line key={i} x1={pad + x} y1={pad + 1} x2={pad + x} y2={pad + bY} stroke="#bbb" strokeWidth="0.4" />)}
        <line x1={pad + 1 * sc} y1={pad + bY} x2={pad + sw - 1 * sc} y2={pad + bY} stroke="#c4960a" strokeWidth="4" strokeLinecap="round" />
        <text x={pad + sw / 2} y={pad + bY - 6} textAnchor="middle" style={{ fontSize: 5.5, fill: "#9a7a00", fontWeight: 700, fontFamily: "monospace" }}>{c.beamSize.toUpperCase()}</text>
        <text x={pad + sw / 2} y={pad + sd / 2 - 4} textAnchor="middle" style={{ fontSize: 7, fill: "#888", fontFamily: "monospace" }}>{c.joistSize} @ {c.sp}" O.C.</text>
        {c.pp.map((px, i) => <g key={i}><circle cx={pad + px * sc} cy={pad + bY} r={4.5} fill="#c4a060" stroke="#444" strokeWidth="1" /><circle cx={pad + px * sc} cy={pad + bY} r={9} fill="none" stroke="#444" strokeWidth="0.4" strokeDasharray="2,2" /></g>)}
      </>}
      {mode === "plan" && <text x={pad + sw / 2} y={pad + sd / 2 + 3} textAnchor="middle" style={{ fontSize: 10, fill: "#666", fontFamily: "monospace", fontWeight: 700 }}>{c.area} S.F.</text>}
      {[[pad, pad, pad, pad + sd], [pad, pad + sd, pad + sw, pad + sd], [pad + sw, pad, pad + sw, pad + sd]].map(([x1, y1, x2, y2], i) => (
        <line key={i} x1={x1} y1={y1} x2={x2} y2={y2} stroke="#444" strokeWidth="3.5" />
      ))}
      {p.hasStairs && c.stairs && p.stairLocation === "front" && (() => {
        const st = c.stairs; const stW = st.width * sc; const stH = st.runFt * sc;
        const sx = pad + sw / 2 - stW / 2; const sy = pad + sd + 1;
        const tStep = stH / Math.max(st.nTreads, 1);
        return <g>
          <rect x={sx} y={sy} width={stW} height={stH} fill="none" stroke="#444" strokeWidth="0.8" />
          {[...Array(st.nTreads + 1)].map((_, i) => <line key={i} x1={sx} y1={sy + i * tStep} x2={sx + stW} y2={sy + i * tStep} stroke="#aaa" strokeWidth="0.4" />)}
          {[...Array(st.nStringers)].map((_, i) => { const ssx = st.nStringers > 1 ? sx + i * stW / (st.nStringers - 1) : sx + stW / 2; return <line key={`s${i}`} x1={ssx} y1={sy} x2={ssx} y2={sy + stH} stroke="#999" strokeWidth="0.3" strokeDasharray="2,2" />; })}
          <text x={sx + stW / 2} y={sy + stH / 2 + 2} textAnchor="middle" style={{ fontSize: 5.5, fill: "#444", fontFamily: "monospace", fontWeight: 700 }}>DN</text>
          {st.hasLanding && <rect x={sx - 2} y={sy + stH + 1} width={stW + 4} height={18} fill="#e8e8e0" stroke="#444" strokeWidth="0.5" strokeDasharray="3,2" />}
          <text x={sx + stW + 4} y={sy + stH / 2} style={{ fontSize: 4, fill: "#666", fontFamily: "monospace" }}>{st.nStringers}×2×12</text>
        </g>;
      })()}
      {p.hasStairs && c.stairs && p.stairLocation === "left" && (() => {
        const st = c.stairs; const stW = st.width * sc; const stH = st.runFt * sc;
        const sx = pad - stH - 1; const sy = pad + sd / 2 - stW / 2;
        const tStep = stH / Math.max(st.nTreads, 1);
        return <g>
          <rect x={sx} y={sy} width={stH} height={stW} fill="none" stroke="#444" strokeWidth="0.8" />
          {[...Array(st.nTreads + 1)].map((_, i) => <line key={i} x1={sx + stH - i * tStep} y1={sy} x2={sx + stH - i * tStep} y2={sy + stW} stroke="#aaa" strokeWidth="0.4" />)}
          {[...Array(st.nStringers)].map((_, i) => { const ssy = st.nStringers > 1 ? sy + i * stW / (st.nStringers - 1) : sy + stW / 2; return <line key={`s${i}`} x1={sx} y1={ssy} x2={sx + stH} y2={ssy} stroke="#999" strokeWidth="0.3" strokeDasharray="2,2" />; })}
          <text x={sx + stH / 2} y={sy + stW / 2 + 2} textAnchor="middle" style={{ fontSize: 5.5, fill: "#444", fontFamily: "monospace", fontWeight: 700 }}>DN</text>
          {st.hasLanding && <rect x={sx - 19} y={sy - 2} width={18} height={stW + 4} fill="#e8e8e0" stroke="#444" strokeWidth="0.5" strokeDasharray="3,2" />}
        </g>;
      })()}
      {p.hasStairs && c.stairs && p.stairLocation === "right" && (() => {
        const st = c.stairs; const stW = st.width * sc; const stH = st.runFt * sc;
        const sx = pad + sw + 1; const sy = pad + sd / 2 - stW / 2;
        const tStep = stH / Math.max(st.nTreads, 1);
        return <g>
          <rect x={sx} y={sy} width={stH} height={stW} fill="none" stroke="#444" strokeWidth="0.8" />
          {[...Array(st.nTreads + 1)].map((_, i) => <line key={i} x1={sx + i * tStep} y1={sy} x2={sx + i * tStep} y2={sy + stW} stroke="#aaa" strokeWidth="0.4" />)}
          {[...Array(st.nStringers)].map((_, i) => { const ssy = st.nStringers > 1 ? sy + i * stW / (st.nStringers - 1) : sy + stW / 2; return <line key={`s${i}`} x1={sx} y1={ssy} x2={sx + stH} y2={ssy} stroke="#999" strokeWidth="0.3" strokeDasharray="2,2" />; })}
          <text x={sx + stH / 2} y={sy + stW / 2 + 2} textAnchor="middle" style={{ fontSize: 5.5, fill: "#444", fontFamily: "monospace", fontWeight: 700 }}>DN</text>
          {st.hasLanding && <rect x={sx + stH + 1} y={sy - 2} width={18} height={stW + 4} fill="#e8e8e0" stroke="#444" strokeWidth="0.5" strokeDasharray="3,2" />}
        </g>;
      })()}
      <line x1={pad} y1={pad + sd + 25} x2={pad + sw} y2={pad + sd + 25} stroke="#c62828" strokeWidth="0.6" />
      <line x1={pad} y1={pad + sd + 22} x2={pad} y2={pad + sd + 28} stroke="#c62828" strokeWidth="0.6" />
      <line x1={pad + sw} y1={pad + sd + 22} x2={pad + sw} y2={pad + sd + 28} stroke="#c62828" strokeWidth="0.6" />
      <text x={pad + sw / 2} y={pad + sd + 37} textAnchor="middle" style={{ fontSize: 9, fill: "#c62828", fontWeight: 800, fontFamily: "'DM Mono', monospace" }}>{c.W}'-0"</text>
      <line x1={pad + sw + 20} y1={pad} x2={pad + sw + 20} y2={pad + sd} stroke="#1565c0" strokeWidth="0.6" />
      <line x1={pad + sw + 17} y1={pad} x2={pad + sw + 23} y2={pad} stroke="#1565c0" strokeWidth="0.6" />
      <line x1={pad + sw + 17} y1={pad + sd} x2={pad + sw + 23} y2={pad + sd} stroke="#1565c0" strokeWidth="0.6" />
      <text x={pad + sw + 32} y={pad + sd / 2 + 3} textAnchor="middle" style={{ fontSize: 9, fill: "#1565c0", fontWeight: 800, fontFamily: "'DM Mono', monospace" }} transform={`rotate(90, ${pad + sw + 32}, ${pad + sd / 2})`}>{c.D}'-0"</text>
      <g transform={`translate(${svgW - 28}, 25)`}><line x1="0" y1="14" x2="0" y2="0" stroke="#444" strokeWidth="1.5" /><polygon points="-3.5,4 0,0 3.5,4" fill="#444" /><text x="0" y="-4" textAnchor="middle" style={{ fontSize: 7, fontWeight: 800, fill: "#444" }}>N</text></g>
    </svg>
  );
}

// ============================================================
// ELEVATION SVG
// ============================================================
function ElevationView({ c, p }) {
  const { W, D, H, beamSize, postSize, nP, pp, fDiam, fDepth } = c;
  const pad = 40; const sY = Math.min(16, 250 / Math.max(H + 6, 10)); const sX = Math.min(14, 440 / Math.max(W + 10, 20));
  const gnd = pad + (H + 4) * sY; const dY = gnd - H * sY; const rTop = dY - 3 * sY;
  const dX = pad; const dSW = W * sX;
  const hW = (p.houseWidth || 40) * sX; const hX = dX + (dSW - hW) / 2;
  const fndH = (H + 1) * sY; const f1H = 8.5 * sY; const f2H = H > 6 ? 8 * sY : 0;
  const wallH = fndH + f1H + f2H; const roofPk = 5 * sY; const hTop = gnd - wallH;
  const svgW = dSW + pad * 2 + 60; const svgH = wallH + roofPk + pad + 30;
  const bH = 1 * sY;
  return (
    <svg viewBox={`0 0 ${svgW} ${svgH}`} style={{ width: "100%", height: "auto" }}>

        }
      })()}
    </svg>

}

    scene.add(sun); const fill = new THREE.DirectionalLight(0xc0d0ff, 0.3); fill.position.set(-10, 15, -10); scene.add(fill);

    const gnd = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0xb8c9a0, roughness: 1 }));
    gnd.rotation.x = -Math.PI / 2; gnd.receiveShadow = true; scene.add(gnd);
    const grid = new THREE.GridHelper(80, 80, 0xa0b088, 0xa8b890); grid.position.y = 0.01; scene.add(grid);

    const mats = {
      concrete: new THREE.MeshStandardMaterial({ color: 0xb8b8b8, roughness: 0.9 }),

      rail: new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.4, metalness: 0.3 }),
      house: new THREE.MeshStandardMaterial({ color: 0xd8d4c8, roughness: 0.8 }),
      roof: new THREE.MeshStandardMaterial({ color: 0x666666, roughness: 0.7 }),
      win: new THREE.MeshStandardMaterial({ color: 0x90bcd4, roughness: 0.2 }),
      metal: new THREE.MeshStandardMaterial({ color: 0x888888, roughness: 0.3, metalness: 0.5 }),
    };

    const cx = -W / 2, cz = -D / 2;

    // House
    const hW = p.houseWidth || 40, hD = 14, hH = Math.max(H + 8, 12);
    const hX = cx + (W - hW) / 2, hZ = cz - hD;
    const house = new THREE.Mesh(new THREE.BoxGeometry(hW, hH, hD), mats.house);
    house.position.set(hX + hW / 2, hH / 2, hZ + hD / 2); house.castShadow = true; scene.add(house);

    // Roof
    const ov = 1.5, rpk = 5;
    const rx1 = hX - ov, rx2 = hX + hW + ov, rxM = hX + hW / 2;
    const ry = hH, ryP = hH + rpk, rz1 = hZ - 1, rz2 = hZ + hD + 1;
    const rv = new Float32Array([rx1,ry,rz2,rx2,ry,rz2,rxM,ryP,rz2, rx2,ry,rz1,rx1,ry,rz1,rxM,ryP,rz1, rx1,ry,rz1,rx1,ry,rz2,rxM,ryP,rz2,rx1,ry,rz1,rxM,ryP,rz2,rxM,ryP,rz1, rx2,ry,rz2,rx2,ry,rz1,rxM,ryP,rz1,rx2,ry,rz2,rxM,ryP,rz1,rxM,ryP,rz2, rx1,ry,rz1,rx2,ry,rz1,rx2,ry,rz2,rx1,ry,rz1,rx2,ry,rz2,rx1,ry,rz2]);
    const rg = new THREE.BufferGeometry(); rg.setAttribute('position', new THREE.BufferAttribute(rv, 3)); rg.computeVertexNormals();
    const roofM = new THREE.Mesh(rg, mats.roof); roofM.castShadow = true; scene.add(roofM);

    // Windows + door
    for (let wx = 0.2; wx < 0.9; wx += 0.3) { const w = new THREE.Mesh(new THREE.PlaneGeometry(3, 4), mats.win); w.position.set(hX + hW * wx, H + 5, hZ + hD + 0.05); scene.add(w); }
    const dr = new THREE.Mesh(new THREE.PlaneGeometry(4, 6.5), mats.win); dr.position.set(cx + W / 2, H - 6.5 / 2 + 6.7, cz + 0.05); scene.add(dr);

    // Piers
    const pR = (fDiam / 12) / 2;
    const pierG = new THREE.CylinderGeometry(pR, pR, 0.5, 16);
    pp.forEach(px => { const pr = new THREE.Mesh(pierG, mats.concrete); pr.position.set(cx + px, 0.25, cz + D - 1.5); scene.add(pr); });

    // Posts
    const pD = postSize === "6x6" ? 5.5 / 12 : 3.5 / 12;
    const postG = new THREE.BoxGeometry(pD, H, pD);
    pp.forEach(px => { const po = new THREE.Mesh(postG, mats.post); po.position.set(cx + px, H / 2, cz + D - 1.5); po.castShadow = true; scene.add(po); });

    // Post caps
    const capG = new THREE.BoxGeometry(pD + 0.2, 0.15, pD + 0.2);
    pp.forEach(px => { const ca = new THREE.Mesh(capG, mats.metal); ca.position.set(cx + px, H, cz + D - 1.5); scene.add(ca); });

    // Beam
    const bH2 = 11.875 / 12, bW2 = beamSize.includes("3") ? 5.25 / 12 : 3.5 / 12;
    const bm = new THREE.Mesh(new THREE.BoxGeometry(W - 2, bH2, bW2), mats.beam);

    // Ledger
    const ld = new THREE.Mesh(new THREE.BoxGeometry(W, 9.25 / 12, 1.5 / 12), mats.joist);
    ld.position.set(cx + W / 2, H - 0.4, cz + 0.06); scene.add(ld);

    // Joists
    const jH2 = 9.25 / 12, jW2 = 1.5 / 12, jLen = D - 1.5;

    for (let x = sp / 12; x < W; x += sp / 12) { const j = new THREE.Mesh(jG, mats.joist); j.position.set(cx + x, H - jH2 / 2 - 0.1, cz + jLen / 2); scene.add(j); }

    for (let x = bdW / 2; x < W; x += bdW) { const b = new THREE.Mesh(bdG, mats.deck); b.position.set(cx + x, H + bdH / 2, cz + D / 2); b.receiveShadow = true; scene.add(b); }

    const rH = 3, trY = H + bdH + rH, brY = H + bdH + 0.25;
    [[new THREE.BoxGeometry(W, 0.1, 0.08), cx + W / 2, trY, cz + D], [new THREE.BoxGeometry(0.08, 0.1, D), cx, trY, cz + D / 2], [new THREE.BoxGeometry(0.08, 0.1, D), cx + W, trY, cz + D / 2]].forEach(([g, x, y, z]) => { const r = new THREE.Mesh(g, mats.rail); r.position.set(x, y, z); scene.add(r); });
    [[new THREE.BoxGeometry(W, 0.06, 0.06), cx + W / 2, brY, cz + D], [new THREE.BoxGeometry(0.06, 0.06, D), cx, brY, cz + D / 2], [new THREE.BoxGeometry(0.06, 0.06, D), cx + W, brY, cz + D / 2]].forEach(([g, x, y, z]) => { const r = new THREE.Mesh(g, mats.rail); r.position.set(x, y, z); scene.add(r); });

    const balG = new THREE.BoxGeometry(0.04, rH - 0.3, 0.04);
    for (let x = 0; x < W; x += 3.75 / 12) { const b = new THREE.Mesh(balG, mats.rail); b.position.set(cx + x, H + bdH + rH / 2 + 0.1, cz + D); scene.add(b); }

    const crnG = new THREE.BoxGeometry(0.2, rH + 0.2, 0.2);
    [[cx, cz], [cx + W, cz], [cx, cz + D], [cx + W, cz + D]].forEach(([x, z]) => { const cp = new THREE.Mesh(crnG, mats.rail); cp.position.set(x, H + bdH + rH / 2, z); scene.add(cp); });

    // Controls
    const cv = ren.domElement;
    const onD = e => { orbit.current.drag = true; const t = e.touches ? e.touches[0] : e; orbit.current.lx = t.clientX; orbit.current.ly = t.clientY; };
    const onM = e => { if (!orbit.current.drag) return; const t = e.touches ? e.touches[0] : e; orbit.current.theta -= (t.clientX - orbit.current.lx) * 0.005; orbit.current.phi = Math.max(0.1, Math.min(1.4, orbit.current.phi - (t.clientY - orbit.current.ly) * 0.005)); orbit.current.lx = t.clientX; orbit.current.ly = t.clientY; };
    const onU = () => { orbit.current.drag = false; };
    const onW = e => { orbit.current.dist = Math.max(8, Math.min(80, orbit.current.dist + e.deltaY * 0.03)); };
    cv.addEventListener("mousedown", onD); cv.addEventListener("mousemove", onM); cv.addEventListener("mouseup", onU); cv.addEventListener("mouseleave", onU); cv.addEventListener("wheel", onW);
    cv.addEventListener("touchstart", onD, { passive: true }); cv.addEventListener("touchmove", onM, { passive: true }); cv.addEventListener("touchend", onU);

    const lookY = H / 2 + 1;
    const anim = () => { frameRef.current = requestAnimationFrame(anim); const o = orbit.current; cam.position.set(o.dist * Math.sin(o.phi) * Math.cos(o.theta), o.dist * Math.cos(o.phi) + lookY, o.dist * Math.sin(o.phi) * Math.sin(o.theta)); cam.lookAt(0, lookY, 0); ren.render(scene, cam); };
    anim();

    return () => { cancelAnimationFrame(frameRef.current); cv.removeEventListener("mousedown", onD); cv.removeEventListener("mousemove", onM); cv.removeEventListener("mouseup", onU); cv.removeEventListener("mouseleave", onU); cv.removeEventListener("wheel", onW); cv.removeEventListener("touchstart", onD); cv.removeEventListener("touchmove", onM); cv.removeEventListener("touchend", onU); ren.dispose(); };
  }, [W, D, H, nP, pp, postSize, beamSize, sp, fDiam, p.deckingType]);

  return <div ref={ref} style={{ width: "100%", height: 380, borderRadius: 6, overflow: "hidden" }} />;
}

        const gnd = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0xb8c9a0, roughness: 1 }));
        gnd.rotation.x = -Math.PI / 2; gnd.receiveShadow = true; scene.add(gnd);

        const cx = -W / 2, cz = -D / 2;

        // House
        const hW = p.houseWidth || 40, hD = 14, hH = Math.max(H + 8, 12);

        const house = new THREE.Mesh(new THREE.BoxGeometry(hW, hH, hD), mats.house);
        house.position.set(hX + hW / 2, hH / 2, hZ + hD / 2); house.castShadow = true; scene.add(house);

        // Roof
        const ov = 1.5, rpk = 5;
        const rx1 = hX - ov, rx2 = hX + hW + ov, rxM = hX + hW / 2;
        const ry = hH, ryP = hH + rpk, rz1 = hZ - 1, rz2 = hZ + hD + 1;
        const rv = new Float32Array([rx1,ry,rz2,rx2,ry,rz2,rxM,ryP,rz2, rx2,ry,rz1,rx1,ry,rz1,rxM,ryP,rz1, rx1,ry,rz1,rx1,ry,rz2,rxM,ryP,rz2,rx1,ry,rz1,rxM,ryP,rz2,rxM,ryP,rz1, rx2,ry,rz2,rx2,ry,rz1,rxM,ryP,rz1,rx2,ry,rz2,rxM,ryP,rz1,rxM,ryP,rz2, rx1,ry,rz1,rx2,ry,rz1,rx2,ry,rz2,rx1,ry,rz1,rx2,ry,rz2,rx1,ry,rz2]);
        const rg = new THREE.BufferGeometry(); rg.setAttribute('position', new THREE.BufferAttribute(rv, 3)); rg.computeVertexNormals();
        const roofM = new THREE.Mesh(rg, mats.roof); roofM.castShadow = true; scene.add(roofM);

        // Windows + door
        for (let wx = 0.2; wx < 0.9; wx += 0.3) { const wn = new THREE.Mesh(new THREE.PlaneGeometry(3, 4), mats.win); wn.position.set(hX + hW * wx, H + 5, hZ + hD + 0.05); scene.add(wn); }
        const dr = new THREE.Mesh(new THREE.PlaneGeometry(4, 6.5), mats.win); dr.position.set(cx + W / 2, H - 6.5 / 2 + 6.7, cz + 0.05); scene.add(dr);

        // Post caps
        const capG = new THREE.BoxGeometry(pDim + 0.2, 0.15, pDim + 0.2);
        pp.forEach(px => { const ca = new THREE.Mesh(capG, mats.metal); ca.position.set(cx + px, H, cz + D - 1.5); scene.add(ca); });

        // Beam
        const bH2 = 11.875 / 12, bW2 = beamSize.includes("3") ? 5.25 / 12 : 3.5 / 12;
        const bm = new THREE.Mesh(new THREE.BoxGeometry(W - 2, bH2, bW2), mats.beam);
        bm.position.set(cx + W / 2, H - bH2 / 2 - 0.1, cz + D - 1.5); bm.castShadow = true; scene.add(bm);

        // Ledger
        const ld = new THREE.Mesh(new THREE.BoxGeometry(W, 9.25 / 12, 1.5 / 12), mats.joist);
        ld.position.set(cx + W / 2, H - 0.4, cz + 0.06); scene.add(ld);

        // Joists
        const jH2 = 9.25 / 12, jW2 = 1.5 / 12, jLen = D - 1.5;
        const jG = new THREE.BoxGeometry(jW2, jH2, jLen);
        for (let x = sp / 12; x < W; x += sp / 12) { const j = new THREE.Mesh(jG, mats.joist); j.position.set(cx + x, H - jH2 / 2 - 0.1, cz + jLen / 2); scene.add(j); }

        // Rim joists
        const rimF = new THREE.Mesh(new THREE.BoxGeometry(W, jH2, jW2), mats.joist);
        rimF.position.set(cx + W / 2, H - jH2 / 2 - 0.1, cz + D); scene.add(rimF);
        [0, W].forEach(x => { const rim = new THREE.Mesh(new THREE.BoxGeometry(jW2, jH2, D), mats.joist); rim.position.set(cx + x, H - jH2 / 2 - 0.1, cz + D / 2); scene.add(rim); });

        // Decking boards
        const bdW = 5.5 / 12, bdH = 1 / 12;
        const bdG = new THREE.BoxGeometry(bdW - 0.02, bdH, D + 0.1);
        for (let x = bdW / 2; x < W; x += bdW) { const b = new THREE.Mesh(bdG, mats.deck); b.position.set(cx + x, H + bdH / 2, cz + D / 2); b.receiveShadow = true; scene.add(b); }

        // Railing - top + bottom rails
        const rH = 3, trY = H + bdH + rH, brY = H + bdH + 0.25;
        [[new THREE.BoxGeometry(W, 0.1, 0.08), cx + W / 2, trY, cz + D], [new THREE.BoxGeometry(0.08, 0.1, D), cx, trY, cz + D / 2], [new THREE.BoxGeometry(0.08, 0.1, D), cx + W, trY, cz + D / 2]].forEach(([g, x, y, z]) => { const r = new THREE.Mesh(g, mats.rail); r.position.set(x, y, z); scene.add(r); });
        [[new THREE.BoxGeometry(W, 0.06, 0.06), cx + W / 2, brY, cz + D], [new THREE.BoxGeometry(0.06, 0.06, D), cx, brY, cz + D / 2], [new THREE.BoxGeometry(0.06, 0.06, D), cx + W, brY, cz + D / 2]].forEach(([g, x, y, z]) => { const r = new THREE.Mesh(g, mats.rail); r.position.set(x, y, z); scene.add(r); });

        // Balusters
        const balG = new THREE.BoxGeometry(0.04, rH - 0.3, 0.04);
        for (let x = 0; x < W; x += 3.75 / 12) { const b = new THREE.Mesh(balG, mats.rail); b.position.set(cx + x, H + bdH + rH / 2 + 0.1, cz + D); scene.add(b); }
        for (let z = 0; z < D; z += 3.75 / 12) { [cx, cx + W].forEach(x => { const b = new THREE.Mesh(balG, mats.rail); b.position.set(x, H + bdH + rH / 2 + 0.1, cz + z); scene.add(b); }); }

        // Corner posts
        const crnG = new THREE.BoxGeometry(0.2, rH + 0.2, 0.2);
        [[cx, cz], [cx + W, cz], [cx, cz + D], [cx + W, cz + D]].forEach(([x, z]) => { const cp = new THREE.Mesh(crnG, mats.rail); cp.position.set(x, H + bdH + rH / 2, z); scene.add(cp); });

        // Camera - nice perspective angle
        const dist = Math.max(W, D, H * 2) * 1.8;
        const theta = 0.8, phi = 0.45;
        const lookY = H / 2 + 1;
        cam.position.set(dist * Math.sin(phi) * Math.cos(theta), dist * Math.cos(phi) + lookY, dist * Math.sin(phi) * Math.sin(theta));
        cam.lookAt(0, lookY, 0);

        ren.render(scene, cam);
        const dataUrl = ren.domElement.toDataURL("image/png");
        ren.dispose();
        resolve(dataUrl.split(",")[1]);
      } catch (e) { console.warn("3D capture failed:", e); resolve(null); }
    });

                  {genStatus === "generating" ? "Generating PDF..." : genStatus === "done" ? "✓ Download Complete — Generate Again?" : "Generate Blueprint — FREE BETA"}
                </button>
                {genStatus === "error" && <div style={{ fontSize: 10, color: "#f44336", fontFamily: mono, marginTop: 8 }}>Error: {genError}</div>}
                <div style={{ fontSize: 8, color: "rgba(255,255,255,0.4)", fontFamily: mono, marginTop: 8 }}>
                  {genStatus === "done" ? "PDF opened in new tab · Check your downloads" : "Instant PDF download · Print-ready quality · Permit-office format"}
                </div>
              </div>
            </>}

            <div style={{ display: "flex", justifyContent: "space-between", marginTop: 20 }}>
              <button onClick={() => step > 0 ? setStep(step - 1) : setPage("home")} style={{ padding: "9px 18px", border: `1px solid ${br.bd}`, borderRadius: 6, background: "transparent", color: br.mu, cursor: "pointer", fontFamily: mono, fontSize: 11, fontWeight: 600 }}>← {step > 0 ? "Back" : "Home"}</button>
              {step < 3 && <button onClick={() => setStep(step + 1)} style={{ padding: "9px 18px", border: "none", borderRadius: 6, background: br.gn, color: "#fff", cursor: "pointer", fontFamily: mono, fontSize: 11, fontWeight: 700 }}>Next →</button>}
            </div>
          </div>
        </div>

        {/* RIGHT: PREVIEW */}
        <div style={{ flex: "1 1 500px", minWidth: 280 }}>
          <div style={{ background: "#fff", borderRadius: 10, padding: 18, border: `1px solid ${br.bd}`, boxShadow: "0 1px 8px rgba(0,0,0,0.04)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
              <h3 style={{ margin: 0, fontSize: 12, fontWeight: 700, color: br.dk, fontFamily: mono, letterSpacing: "1px", textTransform: "uppercase" }}>Preview</h3>
              <div style={{ display: "flex", gap: 1 }}>
                {views.map(([id, label], i) => <button key={id} onClick={() => setView(id)} style={{ padding: "5px 12px", fontSize: 10, cursor: "pointer", fontFamily: mono, border: view === id ? `1px solid ${br.gn}` : `1px solid ${br.bd}`, background: view === id ? br.gn : "transparent", color: view === id ? "#fff" : br.mu, borderRadius: i === 0 ? "4px 0 0 4px" : i === views.length - 1 ? "0 4px 4px 0" : 0, fontWeight: view === id ? 700 : 400 }}>{label}</button>)}
              </div>
            </div>

            <div style={{ background: view === "3d" ? "transparent" : br.cr, border: view === "3d" ? "none" : `1px solid ${br.bd}`, borderRadius: 6, padding: view === "3d" ? 0 : 12, minHeight: 320 }}>
              {view === "plan" && <>
                <div style={{ display: "flex", gap: 4, marginBottom: 8 }}>
                  {[["plan", "Deck Plan"], ["framing", "Framing"]].map(([id, label]) => <button key={id} onClick={() => setPlanMode(id)} style={{ padding: "4px 10px", fontSize: 9, fontFamily: mono, cursor: "pointer", border: planMode === id ? `1px solid ${br.gn}` : `1px solid ${br.bd}`, background: planMode === id ? br.gn : "transparent", color: planMode === id ? "#fff" : br.mu, borderRadius: 4, fontWeight: planMode === id ? 700 : 400 }}>{label}</button>)}
                </div>
                <PlanView p={p} c={c} mode={planMode} />
              </>}
              {view === "elevation" && <ElevationView c={c} p={p} />}
              {view === "3d" && <Deck3D c={c} p={p} />}
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 6, marginTop: 12 }}>
              {[["Area", `${c.area} SF`, br.dk], ["Joists", c.joistSize, br.bl], ["Beam", c.beamSize.replace("3-ply ", "3×").replace("2-ply ", "2×"), br.ac], ["Posts", `${c.postSize}×${c.nP}`, "#8B6508"], ["Footings", `${c.fDiam}"Ø`, "#777"], ["Est. Cost", `$${m.total.toFixed(0)}`, br.gn]].map(([l, v, cl]) => (
                <div key={l} style={{ padding: "8px 10px", background: br.cr, borderRadius: 6, border: `1px solid ${br.bd}`, textAlign: "center" }}>
                  <div style={{ fontSize: 8, color: br.mu, fontFamily: mono, textTransform: "uppercase", letterSpacing: "0.5px" }}>{l}</div>
                  <div style={{ fontSize: 11, fontWeight: 800, color: cl, fontFamily: mono, marginTop: 1 }}>{v}</div>
                </div>
              ))}
            </div>

            {step >= 2 && <div style={{ marginTop: 14 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: br.mu, fontFamily: mono, letterSpacing: "1px", textTransform: "uppercase", marginBottom: 6 }}>Materials</div>
              <div style={{ maxHeight: 200, overflowY: "auto", borderRadius: 6, border: `1px solid ${br.bd}` }}>
                <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: mono, fontSize: 10 }}>
                  <thead><tr style={{ background: br.wr }}><th style={{ textAlign: "left", padding: "5px 8px", color: br.mu, fontSize: 8 }}>ITEM</th><th style={{ textAlign: "center", padding: "5px 8px", color: br.mu, fontSize: 8 }}>QTY</th><th style={{ textAlign: "right", padding: "5px 8px", color: br.mu, fontSize: 8 }}>EXT</th></tr></thead>
                  <tbody>{m.items.map((it, i) => <tr key={i} style={{ borderBottom: `1px solid ${br.wr}` }}><td style={{ padding: "4px 8px", color: br.tx }}>{it.item}</td><td style={{ padding: "4px 8px", textAlign: "center", color: br.bl, fontWeight: 700 }}>{it.qty}</td><td style={{ padding: "4px 8px", textAlign: "right", color: br.dk }}>${(it.qty * it.cost).toFixed(0)}</td></tr>)}</tbody>
                </table>
              </div>
            </div>}
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
