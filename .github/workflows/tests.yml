# SimpleBlueprints CI -- S84
# Runs on every push and PR to main. Railway autodeploys from main with no
# gate, so this is the tripwire: a red X here means the deploy that just
# went out is suspect. (Gating the deploy itself on green is a later step:
# deploy from a release branch that only advances when this passes.)
name: tests

on:
  push:
    branches: [main, s84]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Python deps (calc engine imports matplotlib via drawing pkg)
        run: pip install matplotlib==3.10.8 numpy==2.4.4  # pinned: linework baseline is version-sensitive (S87)

      - name: Geometry invariants (site plan math, 2700+ checks)
        run: node tests/geometry/lotGeometry.test.js

      - name: Structural verification (IRC known-answer tests, S60 baseline)
        run: python3 tests/test_structural.py

      - name: Post-to-grade consistency (S87, elevations invariant)
        run: python3 tests/test_post_grade.py

      - name: Frost/snow input normalization (S88 B9, calc-vs-checker agreement)
        run: python3 tests/test_frost_snow_normalize.py

      - name: Future products logic tests
        run: python3 tests/test_future_products.py

      - name: Text-over-linework differential (S87 oracle, 2 canonical fixtures)
        run: |
          pip install httpx python-multipart itsdangerous anthropic fastapi stripe psycopg2-binary reportlab pypdf pillow
          SBP_SHEET=arch_d python3 tests/pdf/linework_check.py basic_rect_ledger zones_stairs_lcr

      - name: Panel-overflow differential G5/G6/G7 (S88 oracle, selftest + 2 fixtures)
        run: |
          python3 tests/pdf/panel_check.py --selftest
          SBP_SHEET=arch_d python3 tests/pdf/panel_check.py basic_rect_ledger zones_stairs_lcr

      - name: Config matrix + post-in-landing B3/G11 (S88, interior-anchored stair path)
        run: SBP_SHEET=arch_d python3 tests/pdf/config_matrix.py

      - name: Fuzz smoke (S87, 8 seeded configs, crash judge)
        run: SBP_SHEET=arch_d python3 tests/pdf/fuzz_configs.py 8
